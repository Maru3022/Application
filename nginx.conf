# HealthLife — nginx reverse proxy config for production TLS
# Place your SSL certificates in /etc/nginx/ssl/ or use Certbot/Let's Encrypt
# Usage: mount this file as /etc/nginx/nginx.conf in your nginx container
#
# Quick Let's Encrypt setup (on your server):
#   certbot certonly --standalone -d api.yourdomain.com
#   # Certificates saved to /etc/letsencrypt/live/api.yourdomain.com/

events {
    worker_connections 1024;
}

http {
    # Security headers applied to all responses
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Content-Security-Policy "default-src 'self'; frame-ancestors 'none';" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # Hide nginx version
    server_tokens off;

    # Upstream: Spring Boot gateway
    upstream healthlife_gateway {
        server gateway-service:8080;
        keepalive 32;
    }

    # HTTP → HTTPS redirect
    server {
        listen 80;
        server_name _;
        return 301 https://$host$request_uri;
    }

    # HTTPS
    server {
        listen 443 ssl http2;
        server_name api.yourdomain.com;   # <-- replace with your domain

        ssl_certificate     /etc/nginx/ssl/fullchain.pem;   # Let's Encrypt path
        ssl_certificate_key /etc/nginx/ssl/privkey.pem;
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         HIGH:!aNULL:!MD5;
        ssl_prefer_server_ciphers on;
        ssl_session_cache   shared:SSL:10m;
        ssl_session_timeout 10m;

        # Proxy to gateway
        location / {
            proxy_pass         http://healthlife_gateway;
            proxy_http_version 1.1;
            proxy_set_header   Connection "";
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;

            # Timeouts
            proxy_connect_timeout 5s;
            proxy_send_timeout    60s;
            proxy_read_timeout    60s;

            # Buffer
            proxy_buffering    on;
            proxy_buffer_size  8k;
            proxy_buffers      16 8k;
        }

        # Block internal actuator from the outside
        location /internal/ {
            return 403;
        }

        # Health check endpoint for load balancer (no auth required)
        location = /health {
            access_log off;
            return 200 "OK\n";
            add_header Content-Type text/plain;
        }
    }
}
