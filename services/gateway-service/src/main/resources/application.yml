server:
  port: 8080
  shutdown: graceful
  tomcat:
    max-threads: 200
    min-spare-threads: 10
    max-connections: 10000
    accept-count: 100
    connection-timeout: 5000

spring:
  application:
    name: gateway-service
  lifecycle:
    timeout-per-shutdown-phase: 30s
  data:
    redis:
      host: ${SPRING_DATA_REDIS_HOST:localhost}
      port: ${SPRING_DATA_REDIS_PORT:6379}
      timeout: 2000
      lettuce:
        pool:
          max-active: 16
          max-idle: 8
          min-idle: 4

jwt:
  secret: ${JWT_SECRET}
  access-token:
    expiration: 900000
  refresh-token:
    expiration: 604800000

gateway:
  routes:
    auth: ${GATEWAY_ROUTE_AUTH:http://localhost:8081}
    users: ${GATEWAY_ROUTE_USERS:http://localhost:8082}
    health: ${GATEWAY_ROUTE_HEALTH:http://localhost:8083}
    mental: ${GATEWAY_ROUTE_MENTAL:http://localhost:8084}
    support: ${GATEWAY_ROUTE_SUPPORT:http://localhost:8084}
    nutrition: ${GATEWAY_ROUTE_NUTRITION:http://localhost:8085}
    ai: ${GATEWAY_ROUTE_AI:http://localhost:8086}
    social: ${GATEWAY_ROUTE_SOCIAL:http://localhost:8087}
    notifications: ${GATEWAY_ROUTE_NOTIFICATIONS:http://localhost:8088}
    analytics: ${GATEWAY_ROUTE_ANALYTICS:http://localhost:8089}
    payments: ${GATEWAY_ROUTE_PAYMENTS:http://localhost:8090}

cors:
  # Comma-separated list of allowed origins. Override via CORS_ALLOWED_ORIGINS env var in production.
  allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:3000,http://localhost:8081}

management:
  endpoints:
    web:
      exposure:
        include: health,info
      base-path: /internal/actuator
  endpoint:
    health:
      show-details: when-authorized
      probes:
        enabled: true
  health:
    livenessstate:
      enabled: true
    readinessstate:
      enabled: true
    diskspace:
      enabled: true
      threshold: 1GB
    redis:
      enabled: true
  metrics:
    tags:
      application: ${spring.application.name}
    distribution:
      percentiles-histogram:
        http.server.requests: true
  tracing:
    sampling:
      probability: 0.1

resilience4j:
  circuitbreaker:
    configs:
      default:
        sliding-window-size: 10
        failure-rate-threshold: 50
        wait-duration-in-open-state: 60000
        permitted-number-of-calls-in-half-open-state: 3
        slow-call-duration-threshold: 5000
        slow-call-rate-threshold: 80
    instances:
      gateway:
        base-config: default
  retry:
    configs:
      default:
        max-attempts: 3
        wait-duration: 1000
        retry-exceptions:
          - java.io.IOException
          - java.util.concurrent.TimeoutException
  ratelimiter:
    configs:
      default:
        limit-for-period: 200
        limit-refresh-period: 60s
        timeout-duration: 5s
    instances:
      gateway:
        base-config: default
