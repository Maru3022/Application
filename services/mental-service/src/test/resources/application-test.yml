server:
  port: 0  # Use random port for testing

spring:
  application:
    name: mental-service
  datasource:
    url: jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=false
    username: sa
    password:
    driver-class-name: org.h2.Driver
  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: create-drop
    open-in-view: false
    properties:
      hibernate:
        jdbc:
          batch_size: 50
        order_inserts: true
        order_updates: true
  flyway:
    enabled: false  # Disable migrations during tests

jwt:
  secret: test-secret-key-for-testing-purposes-only
  access-token:
    expiration: 900000
  refresh-token:
    expiration: 604800000

support:
  anthropic:
    api-key: test-api-key-not-used
    model: claude-sonnet-4-20250514
  rate-limit-requests-per-minute: 20

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: always
  metrics:
    enable:
      jvm: false
      system: false
      process: false
      logback: false
    binders:
      jvm:
        enabled: false

cors:
  allowed-origins: http://localhost:3000,http://localhost:8081

logging:
  level:
    root: WARN
    com.healthlife: INFO