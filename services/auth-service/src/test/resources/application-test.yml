spring:
  main:
    allow-bean-definition-overriding: true
  datasource:
    url: jdbc:h2:mem:auth_test;DB_CLOSE_DELAY=-1;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;DEFAULT_NULL_ORDERING=HIGH
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: create-drop
    database-platform: org.hibernate.dialect.H2Dialect
    open-in-view: false
  flyway:
    enabled: false
  autoconfigure:
    exclude:
      # Redis not used in auth-service — mocked or excluded
      - org.springframework.boot.autoconfigure.data.redis.RedisAutoConfiguration
      - org.springframework.boot.autoconfigure.data.redis.RedisReactiveAutoConfiguration
      - org.springframework.boot.autoconfigure.data.redis.RedisRepositoriesAutoConfiguration
      # google-api-client pulls in OAuth2 auto-config — exclude to prevent missing client registration error
      - org.springframework.boot.autoconfigure.security.oauth2.client.servlet.OAuth2ClientAutoConfiguration
      - org.springframework.boot.autoconfigure.security.oauth2.resource.servlet.OAuth2ResourceServerAutoConfiguration
  mail:
    host: localhost
    port: 25
    username: test
    password: test
    properties:
      mail.smtp.auth: false
      mail.smtp.starttls.enable: false

jwt:
  secret: test-secret-key-for-unit-tests-only-not-production-at-least-64-chars-long
  access-token:
    expiration: 3600000
  refresh-token:
    expiration: 86400000

app:
  oauth2:
    google-client-id: test-google-client-id
  frontend-url: http://localhost:3000

oauth:
  google:
    client-id: test-google-client-id
  apple:
    audience: test-apple-audience

cors:
  allowed-origins: http://localhost:3000

logging:
  level:
    root: WARN
    com.healthlife: INFO

management:
  health:
    mail:
      enabled: false
    redis:
      enabled: false
