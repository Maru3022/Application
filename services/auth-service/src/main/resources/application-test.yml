server:
  port: 8081

spring:
  datasource:
    url: jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;MODE=PostgreSQL
    username: sa
    password:
    driver-class-name: org.h2.Driver
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: true
  flyway:
    enabled: false
  data:
    redis:
      host: localhost
      port: 6379
  mail:
    host: localhost
    port: 25

jwt:
  secret: TestSecretKeyThatIsAtLeast256BitsLongForHS256Algorithm2025TestTest
  access-token:
    expiration: 900000
  refresh-token:
    expiration: 604800000
