spring:
  datasource:
    url: jdbc:h2:mem:payment_test;DB_CLOSE_DELAY=-1;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;DEFAULT_NULL_ORDERING=HIGH
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: create-drop
    database-platform: org.hibernate.dialect.H2Dialect
    open-in-view: false
  flyway:
    enabled: false

# No Stripe key — tests exercise the "not configured" path
stripe:
  secret-key: ""
  webhook-secret: ""
  price-pro: price_test_pro
  price-premium: price_test_premium
  price-family: price_test_family

jwt:
  secret: test-secret-key-for-unit-tests-only-not-production-at-least-64-chars-long

logging:
  level:
    root: WARN
    com.healthlife: INFO
