spring:
  # Notification-service has NO database — Redis only. Don't configure datasource.
  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.data.redis.RedisAutoConfiguration
      - org.springframework.boot.autoconfigure.data.redis.RedisReactiveAutoConfiguration
      - org.springframework.boot.autoconfigure.data.redis.RedisRepositoriesAutoConfiguration
  mail:
    host: localhost
    port: 25
    username: test
    password: test
    properties:
      mail.smtp.auth: false
      mail.smtp.starttls.enable: false

firebase:
  service-account-json: ""

jwt:
  secret: test-secret-key-for-unit-tests-only-not-production-at-least-64-chars-long
  access-token:
    expiration: 900000
  refresh-token:
    expiration: 604800000

management:
  health:
    mail:
      enabled: false
    redis:
      enabled: false

logging:
  level:
    root: WARN
    com.healthlife: INFO
