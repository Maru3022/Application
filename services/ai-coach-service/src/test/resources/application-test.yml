spring:
  datasource:
    url: jdbc:h2:mem:aicoach_test;DB_CLOSE_DELAY=-1;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;DEFAULT_NULL_ORDERING=HIGH
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: create-drop
    database-platform: org.hibernate.dialect.H2Dialect
    open-in-view: false
  flyway:
    enabled: false
  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.data.redis.RedisAutoConfiguration
      - org.springframework.boot.autoconfigure.data.redis.RedisReactiveAutoConfiguration
      - org.springframework.boot.autoconfigure.data.redis.RedisRepositoriesAutoConfiguration

# No API key — tests exercise fallback behaviour
ai:
  deepseek:
    api-key: ""
    base-url: https://api.deepseek.com
    model: deepseek-chat

internal:
  health-data-service:
    url: http://localhost:9998
  user-service:
    url: http://localhost:9999

jwt:
  secret: test-secret-key-for-unit-tests-only-not-production-at-least-64-chars-long
  access-token:
    expiration: 900000
  refresh-token:
    expiration: 604800000

management:
  health:
    redis:
      enabled: false

logging:
  level:
    root: WARN
    com.healthlife: INFO
