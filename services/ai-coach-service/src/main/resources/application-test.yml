server:
  port: 8086

spring:
  datasource:
    url: jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;MODE=PostgreSQL
    username: sa
    password:
    driver-class-name: org.h2.Driver
  jpa:
    hibernate:
      ddl-auto: create-drop
  flyway:
    enabled: false
  # Redis is mocked via @MockBean in tests — disable auto-configuration
  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.data.redis.RedisAutoConfiguration
      - org.springframework.boot.autoconfigure.data.redis.RedisReactiveAutoConfiguration
      - org.springframework.boot.autoconfigure.data.redis.RedisRepositoriesAutoConfiguration

management:
  health:
    redis:
      enabled: false

jwt:
  secret: TestSecretKeyThatIsAtLeast256BitsLongForHS256Algorithm2025TestTest
  access-token:
    expiration: 900000
  refresh-token:
    expiration: 604800000

ai:
  deepseek:
    # Empty key — tests verify fallback behaviour when key is not configured
    api-key: ""
    base-url: https://api.deepseek.com
    model: deepseek-chat
