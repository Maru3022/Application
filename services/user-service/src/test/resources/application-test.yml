spring:
  datasource:
    url: jdbc:h2:mem:user_test;DB_CLOSE_DELAY=-1;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;DEFAULT_NULL_ORDERING=HIGH
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: create-drop
    database-platform: org.hibernate.dialect.H2Dialect
    open-in-view: false
  flyway:
    enabled: false

jwt:
  secret: test-secret-key-for-unit-tests-only-not-production-at-least-64-chars-long
  access-token:
    expiration: 900000
  refresh-token:
    expiration: 604800000

cors:
  allowed-origins: http://localhost:3000

logging:
  level:
    root: WARN
    com.healthlife: INFO

management:
  tracing:
    enabled: false
