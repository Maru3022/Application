server:
  port: 8082

spring:
  datasource:
    url: jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;MODE=PostgreSQL
    username: sa
    password:
    driver-class-name: org.h2.Driver
  jpa:
    hibernate:
      ddl-auto: create-drop
  flyway:
    enabled: false

jwt:
  secret: TestSecretKeyThatIsAtLeast256BitsLongForHS256Algorithm2025TestTest
  access-token:
    expiration: 900000
  refresh-token:
    expiration: 604800000
