name: Production CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  JAVA_VERSION: '21'
  MAVEN_OPTS: '-Dmaven.repo.local=$GITHUB_WORKSPACE/.m2/repository'

jobs:
  code-quality:
    name: Code Quality & Formatting
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: temurin
          cache: maven
      - name: Check code formatting
        run: mvn spotless:check -B
      - name: Compile
        run: mvn compile -B
      - name: Check for TODO/FIXME
        run: |
          grep -rn "TODO\|FIXME\|HACK\|XXX" --include="*.java" . | head -20 || true

  security-scan:
    name: OWASP Dependency Check
    runs-on: ubuntu-latest
    needs: code-quality
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: temurin
          cache: maven
      - name: OWASP Dependency Check
        run: mvn org.owasp:dependency-check-maven:check -B -DfailBuildOnCVSS=7
      - name: Upload OWASP Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: owasp-report
          path: '**/dependency-check-report.html'

  unit-tests:
    name: Unit Tests & Coverage
    runs-on: ubuntu-latest
    needs: code-quality
    strategy:
      fail-fast: false
      matrix:
        service:
          - gateway-service
          - auth-service
          - user-service
          - health-data-service
          - mental-service
          - nutrition-service
          - ai-coach-service
          - social-service
          - notification-service
          - analytics-service
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: temurin
          cache: maven
      - name: Install shared modules
        run: mvn install -DskipTests -B -q
      - name: Run tests with coverage
        run: mvn test -B -pl services/${{ matrix.service }} -am
      - name: Upload JaCoCo Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: jacoco-${{ matrix.service }}
          path: 'services/${{ matrix.service }}/target/site/jacoco/**'

  integration-tests:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: unit-tests
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: temurin
          cache: maven
      - name: Install shared modules
        run: mvn install -DskipTests -B -q
      - name: Run integration tests
        run: mvn verify -B -Dspring.profiles.active=test

  build-images:
    name: Build & Scan Docker Images
    runs-on: ubuntu-latest
    needs: [integration-tests, security-scan]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        service:
          - gateway-service
          - auth-service
          - user-service
          - health-data-service
          - mental-service
          - nutrition-service
          - ai-coach-service
          - social-service
          - notification-service
          - analytics-service
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: temurin
          cache: maven
      - name: Build JAR
        run: mvn package -DskipTests -B -pl services/${{ matrix.service }} -am
      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}/${{ matrix.service }}
          tags: |
            type=sha
            type=ref,event=branch
            type=semver,pattern={{version}}
      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: ./services/${{ matrix.service }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
      - name: Scan image with Trivy
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ghcr.io/${{ github.repository }}/${{ matrix.service }}:sha-${{ github.sha }}
          format: sarif
          output: trivy-${{ matrix.service }}.sarif
      - name: Upload Trivy scan results
        uses: actions/upload-artifact@v4
        with:
          name: trivy-${{ matrix.service }}
          path: trivy-${{ matrix.service }}.sarif

  helm-lint:
    name: Helm Lint
    runs-on: ubuntu-latest
    needs: build-images
    steps:
      - uses: actions/checkout@v4
      - name: Set up Helm
        uses: azure/setup-helm@v4
      - name: Lint Helm charts
        run: helm lint k8s/helm/healthlife || echo "Helm charts not yet present"

  deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: [build-images, helm-lint]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment: production
    steps:
      - uses: actions/checkout@v4
      - name: Deploy notification
        run: echo "Deploy triggered for production environment"
      - name: Apply Kubernetes manifests
        run: |
          echo "kubectl apply -f k8s/ --namespace=healthlife"
          echo "In production, configure kubectl context and deploy here"
