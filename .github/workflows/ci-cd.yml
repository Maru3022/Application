name: HealthLife CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  workflow_dispatch:
    inputs:
      skip_tests:
        description: "Skip test execution"
        type: boolean
        default: false
      deploy_environment:
        description: "Target environment for deployment"
        type: choice
        options:
          - none
          - staging
          - production
        default: none

permissions:
  contents: read
  statuses: write
  deployments: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  JAVA_VERSION: "21"
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ${{ github.repository }}
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # ──────────────────────────────────────────────
  # 1. CODE QUALITY & FORMATTING
  # ──────────────────────────────────────────────
  code-quality:
    name: Code Quality & Formatting
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: temurin
          cache: maven

      - name: Cache Maven repository
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: maven-${{ hashFiles('**/pom.xml') }}
          restore-keys: maven-

      - name: Check code formatting (Spotless)
        run: mvn spotless:check -B

      - name: Compile all modules
        run: mvn compile -B

      - name: Detect TODO/FIXME/HACK
        run: |
          count=$(grep -rn "TODO\|FIXME\|HACK\|XXX" --include="*.java" services/ shared/ | wc -l)
          echo "::warning::Found $count TODO/FIXME/HACK/XXX markers"
          grep -rn "TODO\|FIXME\|HACK\|XXX" --include="*.java" services/ shared/ | head -30 || true

  # ──────────────────────────────────────────────
  # 2. SECURITY SCANNING
  # ──────────────────────────────────────────────
  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    needs: code-quality
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: temurin
          cache: maven

      - name: Cache Maven repository
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: maven-${{ hashFiles('**/pom.xml') }}
          restore-keys: maven-

      - name: Install shared modules
        run: mvn install -DskipTests -B -q

      - name: OWASP Dependency Check
        run: mvn org.owasp:dependency-check-maven:check -B -DfailBuildOnCVSS=7
        env:
          NVD_API_KEY: ${{ secrets.NVD_API_KEY }}
        continue-on-error: true

      - name: Upload OWASP Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: owasp-report
          path: "**/dependency-check-report.html"
          if-no-files-found: ignore

      - name: Trivy filesystem scan (SARIF)
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: fs
          scan-ref: .
          format: sarif
          output: trivy-fs.sarif
          severity: HIGH,CRITICAL
          exit-code: 0
        continue-on-error: true

      - name: Upload Trivy SARIF results
        if: always()
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: trivy-fs.sarif

  # ──────────────────────────────────────────────
  # 3. UNIT TESTS & COVERAGE (parallel matrix)
  # ──────────────────────────────────────────────
  unit-tests:
    name: Tests – ${{ matrix.service }}
    runs-on: ubuntu-latest
    needs: code-quality
    if: ${{ !inputs.skip_tests }}
    strategy:
      fail-fast: false
      matrix:
        service:
          - gateway-service
          - auth-service
          - user-service
          - health-data-service
          - mental-service
          - nutrition-service
          - ai-coach-service
          - social-service
          - notification-service
          - analytics-service
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: temurin
          cache: maven

      - name: Cache Maven repository
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: maven-${{ hashFiles('**/pom.xml') }}
          restore-keys: maven-

      - name: Install shared modules
        run: mvn install -DskipTests -B -q

      - name: Run tests with coverage
        run: mvn test -B -pl services/${{ matrix.service }} -am
        env:
          JWT_SECRET: ${{ secrets.JWT_SECRET || 'TestSecretKeyThatIsAtLeast256BitsLongForHS256Algorithm2025TestTest' }}

      - name: Upload Surefire reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-${{ matrix.service }}
          path: "services/${{ matrix.service }}/target/surefire-reports/"
          if-no-files-found: ignore

      - name: Upload JaCoCo report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: jacoco-${{ matrix.service }}
          path: "services/${{ matrix.service }}/target/site/jacoco/**"
          if-no-files-found: ignore

  # ──────────────────────────────────────────────
  # 4. INTEGRATION TESTS
  # ──────────────────────────────────────────────
  integration-tests:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: unit-tests
    if: ${{ !inputs.skip_tests }}
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: healthlife_test
          POSTGRES_USER: healthlife
          POSTGRES_PASSWORD: healthlife_pass
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U healthlife"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: temurin
          cache: maven

      - name: Cache Maven repository
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: maven-${{ hashFiles('**/pom.xml') }}
          restore-keys: maven-

      - name: Install shared modules
        run: mvn install -DskipTests -B -q

      - name: Run integration tests
        run: mvn verify -B -Dspring.profiles.active=test -DexcludedGroups= -Dgroups=integration
        env:
          JWT_SECRET: ${{ secrets.JWT_SECRET || 'TestSecretKeyThatIsAtLeast256BitsLongForHS256Algorithm2025TestTest' }}
          SPRING_DATASOURCE_URL: jdbc:postgresql://localhost:5432/healthlife_test
          SPRING_DATASOURCE_USERNAME: healthlife
          SPRING_DATASOURCE_PASSWORD: healthlife_pass
          SPRING_DATA_REDIS_HOST: localhost
          SPRING_DATA_REDIS_PORT: 6379

  # ──────────────────────────────────────────────
  # 5. BUILD & PUSH DOCKER IMAGES (main only)
  # ──────────────────────────────────────────────
  build-images:
    name: Build & Push – ${{ matrix.service }}
    runs-on: ubuntu-latest
    needs: [integration-tests, security-scan]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        service:
          - gateway-service
          - auth-service
          - user-service
          - health-data-service
          - mental-service
          - nutrition-service
          - ai-coach-service
          - social-service
          - notification-service
          - analytics-service
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: temurin
          cache: maven

      - name: Cache Maven repository
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: maven-${{ hashFiles('**/pom.xml') }}
          restore-keys: maven-

      - name: Build JAR
        run: mvn package -DskipTests -B -pl services/${{ matrix.service }} -am

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/${{ matrix.service }}
          tags: |
            type=sha
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: ./services/${{ matrix.service }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ matrix.service }}
          cache-to: type=gha,mode=max,scope=${{ matrix.service }}
          build-args: |
            BUILD_DATE=${{ github.event.head_commit.timestamp }}
            VCS_REF=${{ github.sha }}

      - name: Scan image with Trivy
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/${{ matrix.service }}:sha-${{ github.sha }}
          format: sarif
          output: trivy-${{ matrix.service }}.sarif
          severity: HIGH,CRITICAL
          exit-code: 0
        continue-on-error: true

      - name: Upload Trivy scan results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: trivy-${{ matrix.service }}
          path: trivy-${{ matrix.service }}.sarif
          if-no-files-found: ignore

  # ──────────────────────────────────────────────
  # 6. HELM LINT & VALIDATE
  # ──────────────────────────────────────────────
  helm-lint:
    name: Helm Chart Validation
    runs-on: ubuntu-latest
    needs: code-quality
    steps:
      - uses: actions/checkout@v4

      - name: Set up Helm
        uses: azure/setup-helm@v4

      - name: Lint Helm charts
        run: helm lint k8s/helm/healthlife

      - name: Template and validate Helm charts
        run: |
          helm template healthlife k8s/helm/healthlife > /tmp/rendered.yaml
          echo "Helm template rendered successfully ($(wc -l < /tmp/rendered.yaml) lines)"
          grep -c "kind:" /tmp/rendered.yaml || true

  # ──────────────────────────────────────────────
  # 7. DEPLOY TO STAGING
  # ──────────────────────────────────────────────
  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    needs: [build-images, helm-lint]
    if: >-
      (github.ref == 'refs/heads/main' && github.event_name == 'push') ||
      (github.ref == 'refs/heads/develop' && github.event_name == 'push') ||
      inputs.deploy_environment == 'staging'
    environment:
      name: staging
      url: https://staging.healthlife.com
    steps:
      - uses: actions/checkout@v4

      - name: Deploy to staging
        run: |
          echo "::group::Deploying to staging environment"
          echo "kubectl config use-context staging"
          echo "helm upgrade --install healthlife k8s/helm/healthlife \
            --namespace healthlife-staging \
            --set image.tag=sha-${{ github.sha }} \
            --values k8s/helm/healthlife/values.yaml \
            --wait --timeout 300s"
          echo "::endgroup::"

      - name: Smoke tests
        run: |
          echo "Running smoke tests against staging..."
          # curl -sf https://staging.healthlife.com/actuator/health || exit 1

  # ──────────────────────────────────────────────
  # 8. DEPLOY TO PRODUCTION
  # ──────────────────────────────────────────────
  deploy-production:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: [build-images, helm-lint, deploy-staging]
    if: >-
      always() &&
      needs.build-images.result != 'failure' &&
      needs.helm-lint.result != 'failure' &&
      ((github.ref == 'refs/heads/main' && github.event_name == 'push') ||
       inputs.deploy_environment == 'production')
    environment:
      name: production
      url: https://healthlife.com
    steps:
      - uses: actions/checkout@v4

      - name: Create deployment record
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.repos.createDeployment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              ref: context.sha,
              environment: 'production',
              required_contexts: [],
              payload: { version: '${{ github.sha }}' }
            });

      - name: Deploy to production
        run: |
          echo "::group::Deploying to production environment"
          echo "kubectl config use-context production"
          echo "helm upgrade --install healthlife k8s/helm/healthlife \
            --namespace healthlife \
            --set image.tag=sha-${{ github.sha }} \
            --values k8s/helm/healthlife/values.yaml \
            --wait --timeout 300s"
          echo "::endgroup::"

      - name: Post-deploy health check
        run: |
          echo "Running post-deployment health checks..."
          # curl -sf https://healthlife.com/actuator/health || exit 1

      - name: Rollback on failure
        if: failure()
        run: |
          echo "::error::Production deployment failed – initiating rollback"
          echo "helm rollback healthlife --namespace healthlife"

  # ──────────────────────────────────────────────
  # 9. NOTIFICATIONS
  # ──────────────────────────────────────────────
  notify:
    name: Pipeline Notification
    runs-on: ubuntu-latest
    needs: [unit-tests, integration-tests, security-scan]
    if: always()
    permissions:
      statuses: write
    steps:
      - name: Determine pipeline status
        id: status
        run: |
          if [ "${{ needs.unit-tests.result }}" == "failure" ] || \
             [ "${{ needs.integration-tests.result }}" == "failure" ] || \
             [ "${{ needs.security-scan.result }}" == "failure" ]; then
            echo "status=failure" >> $GITHUB_OUTPUT
          else
            echo "status=success" >> $GITHUB_OUTPUT
          fi

      - name: Send Slack notification
        if: env.SLACK_WEBHOOK_URL != ''
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: |
          STATUS="${{ steps.status.outputs.status }}"
          EMOJI=":white_check_mark:"
          COLOR="good"
          if [ "$STATUS" = "failure" ]; then
            EMOJI=":x:"
            COLOR="danger"
          fi
          curl -s -X POST "$SLACK_WEBHOOK_URL" \
            -H "Content-Type: application/json" \
            -d "{
              \"attachments\": [{
                \"color\": \"$COLOR\",
                \"title\": \"$EMOJI HealthLife Pipeline: $STATUS\",
                \"fields\": [
                  {\"title\": \"Branch\", \"value\": \"${{ github.ref_name }}\", \"short\": true},
                  {\"title\": \"Commit\", \"value\": \"${{ github.sha }}\", \"short\": true},
                  {\"title\": \"Author\", \"value\": \"${{ github.actor }}\", \"short\": true},
                  {\"title\": \"Run\", \"value\": \"${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}\", \"short\": false}
                ]
              }]
            }" || true

      - name: GitHub commit status
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const state = '${{ steps.status.outputs.status }}' === 'success' ? 'success' : 'failure';
            await github.rest.repos.createCommitStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              sha: context.sha,
              state: state,
              target_url: `${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}`,
              description: `Pipeline ${state}`,
              context: 'HealthLife CI/CD'
            });
