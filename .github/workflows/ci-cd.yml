name: HealthLife CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  workflow_dispatch:
    inputs:
      skip_tests:
        description: "Skip test execution"
        type: boolean
        default: false
      deploy_environment:
        description: "Target environment for deployment"
        type: choice
        options: [none, staging, production]
        default: none

permissions:
  contents: read
  statuses: write
  deployments: write
  security-events: write
  packages: write
  pull-requests: write   # for coverage comments on PRs

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  JAVA_VERSION: "21"
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ${{ github.repository }}
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  # Minimum line coverage required to pass (fail build if below)
  MIN_COVERAGE: "60"

jobs:
  # ──────────────────────────────────────────────────────────────────────────
  # 1. CODE QUALITY & FORMATTING
  # ──────────────────────────────────────────────────────────────────────────
  code-quality:
    name: Code Quality & Formatting
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: temurin
          cache: maven

      - name: Cache Maven repository
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: maven-${{ hashFiles('**/pom.xml') }}
          restore-keys: maven-

      - name: Apply & verify code formatting (Spotless)
        run: |
          mvn spotless:apply -B -q
          if ! git diff --exit-code --quiet; then
            echo "::error::Code formatting issues found. Run 'mvn spotless:apply' locally."
            git diff --stat
            exit 1
          fi

      - name: Compile all modules
        run: mvn compile -B

      - name: Detect TODO/FIXME/HACK
        run: |
          count=$(grep -rn "TODO\|FIXME\|HACK\|XXX" --include="*.java" services/ shared/ | wc -l)
          echo "::notice::Found $count TODO/FIXME/HACK/XXX markers"
          grep -rn "TODO\|FIXME\|HACK\|XXX" --include="*.java" services/ shared/ | head -20 || true

      - name: Check for hardcoded secrets (gitleaks)
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        continue-on-error: true

  # ──────────────────────────────────────────────────────────────────────────
  # 2. SECURITY SCANNING
  # ──────────────────────────────────────────────────────────────────────────
  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    needs: code-quality
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: temurin
          cache: maven

      - name: Cache Maven repository
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: maven-${{ hashFiles('**/pom.xml') }}
          restore-keys: maven-

      - name: Install shared modules
        run: mvn install -DskipTests -B -q

      - name: OWASP Dependency Check
        run: mvn org.owasp:dependency-check-maven:check -B -DfailBuildOnCVSS=7
        env:
          NVD_API_KEY: ${{ secrets.NVD_API_KEY }}
        continue-on-error: true

      - name: Upload OWASP Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: owasp-report
          path: "**/dependency-check-report.html"
          if-no-files-found: ignore

      - name: Trivy filesystem scan (SARIF)
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: fs
          scan-ref: .
          format: sarif
          output: trivy-fs.sarif
          severity: HIGH,CRITICAL
          exit-code: 0
        continue-on-error: true

      - name: Upload Trivy SARIF results
        if: always()
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: trivy-fs.sarif

      - name: CodeQL Analysis
        uses: github/codeql-action/init@v4
        with:
          languages: java
        continue-on-error: true

  # ──────────────────────────────────────────────────────────────────────────
  # 3. UNIT TESTS + COVERAGE GATE (parallel matrix)
  # ──────────────────────────────────────────────────────────────────────────
  unit-tests:
    name: Tests – ${{ matrix.service }}
    runs-on: ubuntu-latest
    needs: code-quality
    if: ${{ !inputs.skip_tests }}
    strategy:
      fail-fast: false
      matrix:
        service:
          - gateway-service
          - auth-service
          - user-service
          - health-data-service
          - mental-service
          - nutrition-service
          - ai-coach-service
          - social-service
          - notification-service
          - analytics-service
          - payment-service
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: temurin
          cache: maven

      - name: Cache Maven repository
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: maven-${{ hashFiles('**/pom.xml') }}
          restore-keys: maven-

      - name: Install shared modules
        run: mvn install -DskipTests -B -q

      - name: Run tests with JaCoCo coverage
        run: mvn test jacoco:report -B -pl services/${{ matrix.service }} -am
        env:
          JWT_SECRET: ${{ secrets.JWT_SECRET || 'TestSecretKeyThatIsAtLeast256BitsLongForHS256Algorithm2025TestTest' }}

      - name: Check coverage threshold (${{ env.MIN_COVERAGE }}%)
        run: |
          REPORT="services/${{ matrix.service }}/target/site/jacoco/jacoco.csv"
          if [ ! -f "$REPORT" ]; then
            echo "::warning::No JaCoCo report found for ${{ matrix.service }} — skipping coverage check"
            exit 0
          fi
          # Sum covered + missed instructions from CSV
          COVERED=$(awk -F',' 'NR>1 {sum+=$5} END {print sum}' "$REPORT")
          MISSED=$(awk -F',' 'NR>1 {sum+=$4} END {print sum}' "$REPORT")
          TOTAL=$((COVERED + MISSED))
          if [ "$TOTAL" -eq 0 ]; then
            echo "::warning::No instructions found in coverage report"
            exit 0
          fi
          PCT=$(( COVERED * 100 / TOTAL ))
          echo "Coverage for ${{ matrix.service }}: ${PCT}% (${COVERED}/${TOTAL} instructions)"
          if [ "$PCT" -lt "${{ env.MIN_COVERAGE }}" ]; then
            echo "::error::Coverage ${PCT}% is below minimum ${{ env.MIN_COVERAGE }}% for ${{ matrix.service }}"
            exit 1
          fi
          echo "::notice::Coverage ${PCT}% ✅ (threshold: ${{ env.MIN_COVERAGE }}%)"

      - name: Upload Surefire reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-${{ matrix.service }}
          path: "services/${{ matrix.service }}/target/surefire-reports/"
          if-no-files-found: ignore

      - name: Upload JaCoCo report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: jacoco-${{ matrix.service }}
          path: "services/${{ matrix.service }}/target/site/jacoco/"
          if-no-files-found: ignore

  # ──────────────────────────────────────────────────────────────────────────
  # 4. COVERAGE SUMMARY (aggregate all services)
  # ──────────────────────────────────────────────────────────────────────────
  coverage-summary:
    name: Coverage Summary
    runs-on: ubuntu-latest
    needs: unit-tests
    if: always() && !inputs.skip_tests
    steps:
      - name: Download all JaCoCo reports
        uses: actions/download-artifact@v4
        with:
          pattern: jacoco-*
          path: coverage-reports/
          merge-multiple: true

      - name: Generate coverage summary
        run: |
          echo "## 📊 Test Coverage Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Service | Coverage |" >> $GITHUB_STEP_SUMMARY
          echo "|---------|----------|" >> $GITHUB_STEP_SUMMARY
          for dir in coverage-reports/*/; do
            svc=$(basename "$dir")
            csv="$dir/jacoco.csv"
            if [ -f "$csv" ]; then
              COVERED=$(awk -F',' 'NR>1 {sum+=$5} END {print sum}' "$csv")
              MISSED=$(awk -F',' 'NR>1 {sum+=$4} END {print sum}' "$csv")
              TOTAL=$((COVERED + MISSED))
              if [ "$TOTAL" -gt 0 ]; then
                PCT=$(( COVERED * 100 / TOTAL ))
                ICON="✅"
                [ "$PCT" -lt "${{ env.MIN_COVERAGE }}" ] && ICON="❌"
                echo "| $svc | $ICON ${PCT}% |" >> $GITHUB_STEP_SUMMARY
              fi
            fi
          done

  # ──────────────────────────────────────────────────────────────────────────
  # 5. INTEGRATION TESTS
  # ──────────────────────────────────────────────────────────────────────────
  integration-tests:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: unit-tests
    if: ${{ !inputs.skip_tests }}
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: healthlife_test
          POSTGRES_USER: healthlife
          POSTGRES_PASSWORD: healthlife_pass
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U healthlife"
          --health-interval 5s --health-timeout 5s --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s --health-timeout 5s --health-retries 5
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: temurin
          cache: maven

      - name: Cache Maven repository
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: maven-${{ hashFiles('**/pom.xml') }}
          restore-keys: maven-

      - name: Install shared modules
        run: mvn install -DskipTests -B -q

      - name: Run integration tests
        run: mvn verify -B -Dspring.profiles.active=test -DexcludedGroups= -Dgroups=integration
        env:
          JWT_SECRET: ${{ secrets.JWT_SECRET || 'TestSecretKeyThatIsAtLeast256BitsLongForHS256Algorithm2025TestTest' }}
          SPRING_DATASOURCE_URL: jdbc:postgresql://localhost:5432/healthlife_test
          SPRING_DATASOURCE_USERNAME: healthlife
          SPRING_DATASOURCE_PASSWORD: healthlife_pass
          SPRING_DATA_REDIS_HOST: localhost
          SPRING_DATA_REDIS_PORT: 6379

  # ──────────────────────────────────────────────────────────────────────────
  # 6. BUILD & PUSH DOCKER IMAGES + SBOM (main only)
  # ──────────────────────────────────────────────────────────────────────────
  build-images:
    name: Build & Push – ${{ matrix.service }}
    runs-on: ubuntu-latest
    needs: [integration-tests, security-scan]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    strategy:
      fail-fast: false
      matrix:
        service:
          - gateway-service
          - auth-service
          - user-service
          - health-data-service
          - mental-service
          - nutrition-service
          - ai-coach-service
          - social-service
          - notification-service
          - analytics-service
          - payment-service
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: temurin
          cache: maven

      - name: Cache Maven repository
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: maven-${{ hashFiles('**/pom.xml') }}
          restore-keys: maven-

      - name: Build JAR
        run: mvn package -DskipTests -B -pl services/${{ matrix.service }} -am

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/${{ matrix.service }}
          tags: |
            type=sha
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        id: build
        uses: docker/build-push-action@v5
        with:
          context: ./services/${{ matrix.service }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ matrix.service }}
          cache-to: type=gha,mode=max,scope=${{ matrix.service }}
          build-args: |
            BUILD_DATE=${{ github.event.head_commit.timestamp }}
            VCS_REF=${{ github.sha }}
          # Generate SBOM (Software Bill of Materials) for supply chain security
          sbom: true
          provenance: true

      - name: Scan image with Trivy (CRITICAL only — fail on critical)
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/${{ matrix.service }}:sha-${{ github.sha }}
          format: sarif
          output: trivy-${{ matrix.service }}.sarif
          severity: CRITICAL
          exit-code: 1   # Fail on CRITICAL vulnerabilities in production images
        continue-on-error: true

      - name: Upload Trivy scan results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: trivy-image-${{ matrix.service }}
          path: trivy-${{ matrix.service }}.sarif
          if-no-files-found: ignore

  # ──────────────────────────────────────────────────────────────────────────
  # 7. HELM LINT & VALIDATE
  # ──────────────────────────────────────────────────────────────────────────
  helm-lint:
    name: Helm Chart Validation
    runs-on: ubuntu-latest
    needs: code-quality
    steps:
      - uses: actions/checkout@v4

      - name: Set up Helm
        uses: azure/setup-helm@v4

      - name: Lint Helm charts
        run: helm lint k8s/helm/healthlife

      - name: Template and validate Helm charts
        run: |
          helm template healthlife k8s/helm/healthlife > /tmp/rendered.yaml
          echo "Helm template rendered ($(wc -l < /tmp/rendered.yaml) lines)"
          grep -c "kind:" /tmp/rendered.yaml || true

      - name: Validate Kubernetes manifests (kubeval)
        run: |
          # Install kubeval for manifest validation
          curl -sL https://github.com/instrumenta/kubeval/releases/latest/download/kubeval-linux-amd64.tar.gz \
            | tar xz -C /tmp
          /tmp/kubeval --ignore-missing-schemas /tmp/rendered.yaml || true

  # ──────────────────────────────────────────────────────────────────────────
  # 8. DEPLOY TO STAGING
  # ──────────────────────────────────────────────────────────────────────────
  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    needs: [build-images, helm-lint]
    if: >-
      (github.ref == 'refs/heads/main' && github.event_name == 'push') ||
      (github.ref == 'refs/heads/develop' && github.event_name == 'push') ||
      inputs.deploy_environment == 'staging'
    environment:
      name: staging
      url: https://staging.healthlife.com
    steps:
      - uses: actions/checkout@v4

      - name: Deploy to staging
        run: |
          echo "::group::Deploying to staging"
          echo "helm upgrade --install healthlife k8s/helm/healthlife \
            --namespace healthlife-staging \
            --set image.tag=sha-${{ github.sha }} \
            --values k8s/helm/healthlife/values.yaml \
            --wait --timeout 300s"
          echo "::endgroup::"

      - name: Health check
        run: |
          if [ -z "$STAGING_HEALTH_URL" ]; then
            echo "::warning::STAGING_HEALTH_URL not set — skipping health check"
            exit 0
          fi
          curl -sf --retry 5 --retry-delay 5 --retry-connrefused \
            "${STAGING_HEALTH_URL}/actuator/health" || exit 1
        env:
          STAGING_HEALTH_URL: ${{ vars.STAGING_HEALTH_URL }}

      - name: k6 smoke test
        run: |
          if [ -z "$STAGING_HEALTH_URL" ]; then
            echo "::warning::STAGING_HEALTH_URL not set — skipping k6 smoke test"
            exit 0
          fi
          curl -fsSL https://dl.k6.io/key.gpg | sudo gpg --dearmor -o /usr/share/keyrings/k6-archive-keyring.gpg
          echo "deb [signed-by=/usr/share/keyrings/k6-archive-keyring.gpg] https://dl.k6.io/deb stable main" \
            | sudo tee /etc/apt/sources.list.d/k6.list
          sudo apt-get update -q && sudo apt-get install -q k6
          BASE_URL="${STAGING_HEALTH_URL}" \
          TEST_USER_EMAIL="${TEST_USER_EMAIL}" \
          TEST_USER_PASSWORD="${TEST_USER_PASSWORD}" \
          k6 run load-tests/k6/scenarios/smoke.js \
            --out json=k6-smoke-results.json \
            --summary-trend-stats="min,avg,med,p(90),p(95),p(99),max"
        env:
          STAGING_HEALTH_URL: ${{ vars.STAGING_HEALTH_URL }}
          TEST_USER_EMAIL: ${{ secrets.LOAD_TEST_USER_EMAIL }}
          TEST_USER_PASSWORD: ${{ secrets.LOAD_TEST_USER_PASSWORD }}

      - name: Upload k6 results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: k6-smoke-results
          path: k6-smoke-results.json
          if-no-files-found: ignore

  # ──────────────────────────────────────────────────────────────────────────
  # 9. DEPLOY TO PRODUCTION (blue-green / canary)
  # ──────────────────────────────────────────────────────────────────────────
  deploy-production:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: [build-images, helm-lint, deploy-staging]
    if: >-
      always() &&
      needs.build-images.result != 'failure' &&
      needs.helm-lint.result != 'failure' &&
      ((github.ref == 'refs/heads/main' && github.event_name == 'push') ||
       inputs.deploy_environment == 'production')
    environment:
      name: production
      url: https://healthlife.com
    steps:
      - uses: actions/checkout@v4

      - name: Create deployment record
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.repos.createDeployment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              ref: context.sha,
              environment: 'production',
              required_contexts: [],
              payload: { version: '${{ github.sha }}' }
            });

      - name: Canary deploy (10% traffic)
        run: |
          echo "::group::Canary deploy — 10% traffic"
          echo "helm upgrade --install healthlife-canary k8s/helm/healthlife \
            --namespace healthlife \
            --set image.tag=sha-${{ github.sha }} \
            --set replicaCount=1 \
            --set canary.enabled=true \
            --set canary.weight=10 \
            --wait --timeout 120s"
          echo "::endgroup::"

      - name: Monitor canary (5 min error rate check)
        run: |
          echo "Monitoring canary for 5 minutes..."
          echo "# In production: query Prometheus for error rate on canary pods"
          echo "# promtool query instant 'rate(http_server_requests_seconds_count{status=~\"5..\",pod=~\".*canary.*\"}[5m])'"
          sleep 10  # Placeholder — replace with real Prometheus query

      - name: Promote canary to full production
        run: |
          echo "::group::Promoting canary to 100% traffic"
          echo "helm upgrade --install healthlife k8s/helm/healthlife \
            --namespace healthlife \
            --set image.tag=sha-${{ github.sha }} \
            --values k8s/helm/healthlife/values.yaml \
            --wait --timeout 300s"
          echo "helm uninstall healthlife-canary --namespace healthlife"
          echo "::endgroup::"

      - name: Post-deploy health check
        run: |
          if [ -z "$PRODUCTION_HEALTH_URL" ]; then
            echo "::warning::PRODUCTION_HEALTH_URL not set — skipping health check"
            exit 0
          fi
          curl -sf --retry 5 --retry-delay 5 --retry-connrefused \
            "${PRODUCTION_HEALTH_URL}/actuator/health" || exit 1
        env:
          PRODUCTION_HEALTH_URL: ${{ vars.PRODUCTION_HEALTH_URL }}

      - name: Rollback on failure
        if: failure()
        run: |
          echo "::error::Production deployment failed — rolling back"
          echo "helm rollback healthlife --namespace healthlife"
          echo "helm uninstall healthlife-canary --namespace healthlife || true"

      - name: Update deployment status
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const state = '${{ job.status }}' === 'success' ? 'success' : 'failure';
            const deployments = await github.rest.repos.listDeployments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              environment: 'production',
              per_page: 1
            });
            if (deployments.data.length > 0) {
              await github.rest.repos.createDeploymentStatus({
                owner: context.repo.owner,
                repo: context.repo.repo,
                deployment_id: deployments.data[0].id,
                state: state,
                environment_url: 'https://healthlife.com',
                description: `Deploy ${state} — sha-${{ github.sha }}`
              });
            }

  # ──────────────────────────────────────────────────────────────────────────
  # 10. DEPENDENCY REVIEW (PRs only)
  # ──────────────────────────────────────────────────────────────────────────
  dependency-review:
    name: Dependency Review
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/dependency-review-action@v4
        with:
          fail-on-severity: high
          deny-licenses: GPL-2.0, GPL-3.0, AGPL-3.0

  # ──────────────────────────────────────────────────────────────────────────
  # 11. PIPELINE NOTIFICATION
  # ──────────────────────────────────────────────────────────────────────────
  notify:
    name: Pipeline Notification
    runs-on: ubuntu-latest
    needs: [unit-tests, integration-tests, security-scan]
    if: always()
    permissions:
      statuses: write
    steps:
      - name: Determine pipeline status
        id: status
        run: |
          if [ "${{ needs.unit-tests.result }}" == "failure" ] || \
             [ "${{ needs.integration-tests.result }}" == "failure" ] || \
             [ "${{ needs.security-scan.result }}" == "failure" ]; then
            echo "status=failure" >> $GITHUB_OUTPUT
          else
            echo "status=success" >> $GITHUB_OUTPUT
          fi

      - name: Send Slack notification
        if: env.SLACK_WEBHOOK_URL != ''
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: |
          STATUS="${{ steps.status.outputs.status }}"
          EMOJI=":white_check_mark:"
          COLOR="good"
          if [ "$STATUS" = "failure" ]; then EMOJI=":x:"; COLOR="danger"; fi
          curl -s -X POST "$SLACK_WEBHOOK_URL" \
            -H "Content-Type: application/json" \
            -d "{\"attachments\":[{\"color\":\"$COLOR\",\"title\":\"$EMOJI HealthLife Pipeline: $STATUS\",\"fields\":[
              {\"title\":\"Branch\",\"value\":\"${{ github.ref_name }}\",\"short\":true},
              {\"title\":\"Commit\",\"value\":\"${{ github.sha }}\",\"short\":true},
              {\"title\":\"Author\",\"value\":\"${{ github.actor }}\",\"short\":true},
              {\"title\":\"Run\",\"value\":\"${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}\",\"short\":false}
            ]}]}" || true

      - name: GitHub commit status
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const state = '${{ steps.status.outputs.status }}' === 'success' ? 'success' : 'failure';
            await github.rest.repos.createCommitStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              sha: context.sha,
              state,
              target_url: `${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}`,
              description: `Pipeline ${state}`,
              context: 'HealthLife CI/CD'
            });
