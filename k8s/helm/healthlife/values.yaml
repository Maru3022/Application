namespace: healthlife

image:
  registry: ghcr.io
  repository: maru3022/application
  tag: latest
  pullPolicy: IfNotPresent

db:
  host: postgres
  port: 5432

redis:
  host: redis
  port: 6379

services:
  gateway-service:
    port: 8080
    replicaCount: 2
    needsRedis: true
    resources:
      requests:
        cpu: 100m
        memory: 256Mi
      limits:
        cpu: 500m
        memory: 512Mi
  auth-service:
    port: 8081
    replicaCount: 2
    dbName: healthlife_auth
    needsRedis: true
    resources:
      requests:
        cpu: 100m
        memory: 256Mi
      limits:
        cpu: 500m
        memory: 512Mi
  user-service:
    port: 8082
    replicaCount: 2
    dbName: healthlife_user
    resources:
      requests:
        cpu: 100m
        memory: 256Mi
      limits:
        cpu: 500m
        memory: 512Mi
  health-data-service:
    port: 8083
    replicaCount: 2
    dbName: healthlife_healthdata
    resources:
      requests:
        cpu: 100m
        memory: 256Mi
      limits:
        cpu: 500m
        memory: 512Mi
  mental-service:
    port: 8084
    replicaCount: 2
    dbName: healthlife_mental
    resources:
      requests:
        cpu: 100m
        memory: 256Mi
      limits:
        cpu: 500m
        memory: 512Mi
  nutrition-service:
    port: 8085
    replicaCount: 2
    dbName: healthlife_nutrition
    resources:
      requests:
        cpu: 100m
        memory: 256Mi
      limits:
        cpu: 500m
        memory: 512Mi
  ai-coach-service:
    port: 8086
    replicaCount: 2
    dbName: healthlife_aicoach
    # AI Coach makes blocking calls to DeepSeek API and performs heavy JSON serialisation.
    # Needs more CPU and memory than lightweight CRUD services.
    resources:
      requests:
        cpu: 200m
        memory: 512Mi
      limits:
        cpu: 1000m
        memory: 1Gi
  social-service:
    port: 8087
    replicaCount: 2
    dbName: healthlife_social
    # Social service handles feed queries, leaderboards, and bulk participant lookups.
    resources:
      requests:
        cpu: 150m
        memory: 384Mi
      limits:
        cpu: 750m
        memory: 768Mi
  notification-service:
    port: 8088
    replicaCount: 2
    needsRedis: true
    resources:
      requests:
        cpu: 100m
        memory: 256Mi
      limits:
        cpu: 500m
        memory: 512Mi
  analytics-service:
    port: 8089
    replicaCount: 2
    needsRedis: true
    resources:
      requests:
        cpu: 100m
        memory: 256Mi
      limits:
        cpu: 500m
        memory: 512Mi
  payment-service:
    port: 8090
    replicaCount: 2
    dbName: healthlife_payment
    resources:
      requests:
        cpu: 100m
        memory: 256Mi
      limits:
        cpu: 500m
        memory: 512Mi

autoscaling:
  enabled: true
  minReplicas: 2
  maxReplicas: 8
  targetCPUUtilizationPercentage: 70

podDisruptionBudget:
  enabled: true
  minAvailable: 1

securityContext:
  runAsNonRoot: true
  runAsUser: 1000
  runAsGroup: 1000
  fsGroup: 1000
  seccompProfile:
    type: RuntimeDefault

containerSecurityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: true
  capabilities:
    drop:
      - ALL

ingress:
  enabled: true
  host: healthlife.local
  tls:
    # Set to true in production and configure cert-manager with a valid issuer.
    # For local development keep false and use self-signed certs or plain HTTP.
    enabled: true
    issuer: letsencrypt-prod
    secretName: healthlife-tls

cors:
  # Override in production with the actual frontend domain(s), comma-separated.
  allowedOrigins: "https://healthlife.local,https://app.healthlife.com"
