{{- range $name, $svc := .Values.services }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ $name }}
  namespace: {{ $.Values.namespace }}
  labels:
    app: {{ $name }}
    {{- include "healthlife.labels" $ | nindent 4 }}
spec:
  replicas: {{ $svc.replicaCount }}
  selector:
    matchLabels:
      app: {{ $name }}
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: {{ $name }}
        {{- include "healthlife.labels" $ | nindent 8 }}
    spec:
      {{- if $.Values.image.pullSecrets }}
      imagePullSecrets:
        {{- range $.Values.image.pullSecrets }}
        - name: {{ .name }}
        {{- end }}
      {{- end }}
      terminationGracePeriodSeconds: 45
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                topologyKey: kubernetes.io/hostname
                labelSelector:
                  matchLabels:
                    app: {{ $name }}
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: kubernetes.io/hostname
          whenUnsatisfiable: ScheduleAnyway
          labelSelector:
            matchLabels:
              app: {{ $name }}
      securityContext:
        {{- toYaml $.Values.securityContext | nindent 8 }}
      containers:
        - name: {{ $name }}
          image: "{{ $.Values.image.registry }}/{{ $.Values.image.repository }}/{{ $name }}:{{ $.Values.image.tag }}"
          imagePullPolicy: {{ $.Values.image.pullPolicy }}
          ports:
            - containerPort: {{ $svc.port }}
          resources:
            {{- toYaml $svc.resources | nindent 12 }}
          securityContext:
            {{- toYaml $.Values.containerSecurityContext | nindent 12 }}
          env:
            - name: SPRING_PROFILES_ACTIVE
              value: "production"
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: healthlife-secrets
                  key: jwt-secret
            {{- if $svc.dbName }}
            - name: SPRING_DATASOURCE_URL
              value: "jdbc:postgresql://{{ $.Values.db.host }}:{{ $.Values.db.port }}/{{ $svc.dbName }}"
            - name: SPRING_DATASOURCE_USERNAME
              valueFrom:
                secretKeyRef:
                  name: healthlife-db-credentials
                  key: username
            - name: SPRING_DATASOURCE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: healthlife-db-credentials
                  key: password
            {{- end }}
            {{- if $svc.needsRedis }}
            - name: SPRING_DATA_REDIS_HOST
              value: {{ $.Values.redis.host | quote }}
            - name: SPRING_DATA_REDIS_PORT
              value: {{ $.Values.redis.port | quote }}
            {{- end }}
            {{- if eq $name "gateway-service" }}
            - name: GATEWAY_ROUTE_AUTH
              value: "http://auth-service:8081"
            - name: GATEWAY_ROUTE_USERS
              value: "http://user-service:8082"
            - name: GATEWAY_ROUTE_HEALTH
              value: "http://health-data-service:8083"
            - name: GATEWAY_ROUTE_MENTAL
              value: "http://mental-service:8084"
            - name: GATEWAY_ROUTE_NUTRITION
              value: "http://nutrition-service:8085"
            - name: GATEWAY_ROUTE_AI
              value: "http://ai-coach-service:8086"
            - name: GATEWAY_ROUTE_SOCIAL
              value: "http://social-service:8087"
            - name: GATEWAY_ROUTE_NOTIFICATIONS
              value: "http://notification-service:8088"
            - name: GATEWAY_ROUTE_ANALYTICS
              value: "http://analytics-service:8089"
            - name: GATEWAY_ROUTE_PAYMENTS
              value: "http://payment-service:8090"
            {{- end }}
            {{- if eq $name "ai-coach-service" }}
            - name: DEEPSEEK_API_KEY
              valueFrom:
                secretKeyRef:
                  name: healthlife-secrets
                  key: deepseek-api-key
            - name: DEEPSEEK_MODEL
              value: "deepseek-v4-flash"
            {{- end }}
            {{- if eq $name "auth-service" }}
            - name: MAIL_USERNAME
              valueFrom:
                secretKeyRef:
                  name: healthlife-mail-credentials
                  key: username
            - name: MAIL_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: healthlife-mail-credentials
                  key: password
            - name: OAUTH_GOOGLE_CLIENT_ID
              valueFrom:
                secretKeyRef:
                  name: healthlife-secrets
                  key: oauth-google-client-id
            - name: OAUTH_APPLE_AUDIENCE
              valueFrom:
                secretKeyRef:
                  name: healthlife-secrets
                  key: oauth-apple-audience
            {{- end }}
            {{- if eq $name "notification-service" }}
            - name: FIREBASE_SERVICE_ACCOUNT_JSON
              valueFrom:
                secretKeyRef:
                  name: healthlife-secrets
                  key: firebase-service-account-json
            {{- end }}
            {{- if eq $name "payment-service" }}
            - name: STRIPE_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: healthlife-secrets
                  key: stripe-secret-key
            - name: STRIPE_WEBHOOK_SECRET
              valueFrom:
                secretKeyRef:
                  name: healthlife-secrets
                  key: stripe-webhook-secret
            - name: STRIPE_PRICE_PRO
              valueFrom:
                secretKeyRef:
                  name: healthlife-secrets
                  key: stripe-price-pro
            - name: STRIPE_PRICE_PREMIUM
              valueFrom:
                secretKeyRef:
                  name: healthlife-secrets
                  key: stripe-price-premium
            - name: STRIPE_PRICE_FAMILY
              valueFrom:
                secretKeyRef:
                  name: healthlife-secrets
                  key: stripe-price-family
            {{- end }}
            - name: CORS_ALLOWED_ORIGINS
              value: {{ $.Values.cors.allowedOrigins | quote }}
          startupProbe:
            httpGet:
              path: /actuator/health/liveness
              port: {{ $svc.port }}
            failureThreshold: 30
            periodSeconds: 5
          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: {{ $svc.port }}
            initialDelaySeconds: 10
            periodSeconds: 10
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /actuator/health/liveness
              port: {{ $svc.port }}
            initialDelaySeconds: 60
            periodSeconds: 15
            failureThreshold: 5
          lifecycle:
            preStop:
              exec:
                command: ["sh", "-c", "sleep 10"]
          volumeMounts:
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: tmp
          emptyDir: {}
---
{{- end }}