{{- range $name, $svc := .Values.services }}
apiVersion: v1
kind: Service
metadata:
  name: {{ $name }}
  namespace: {{ $.Values.namespace }}
  labels:
    app: {{ $name }}
    {{- include "healthlife.labels" $ | nindent 4 }}
spec:
  selector:
    app: {{ $name }}
  ports:
    - name: http
      port: 80
      targetPort: {{ $svc.port }}
  type: ClusterIP
---
{{- end }}
