{{- if .Values.ingress.enabled }}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: healthlife-gateway
  namespace: {{ .Values.namespace }}
  annotations:
    {{- if .Values.ingress.tls.enabled }}
    # Traefik TLS + cert-manager (k3s uses Traefik by default)
    traefik.ingress.kubernetes.io/router.tls: "true"
    traefik.ingress.kubernetes.io/router.entrypoints: websecure
    cert-manager.io/cluster-issuer: {{ .Values.ingress.tls.issuer | quote }}
    {{- end }}
    traefik.ingress.kubernetes.io/router.middlewares: {{ .Values.namespace }}-compress@kubernetescrd,{{ .Values.namespace }}-buffering@kubernetescrd
spec:
  ingressClassName: traefik
  {{- if .Values.ingress.tls.enabled }}
  tls:
    - hosts:
        - {{ .Values.ingress.host }}
      secretName: {{ .Values.ingress.tls.secretName | default "healthlife-tls" }}
  {{- end }}
  rules:
    - host: {{ .Values.ingress.host }}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: gateway-service
                port:
                  number: 80
{{- end }}
