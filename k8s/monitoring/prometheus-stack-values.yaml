# kube-prometheus-stack Helm values for HealthLife production monitoring.
#
# Install:
#   helm repo add prometheus-community https://prometheus-community.github.io/helm-charts
#   helm repo update
#   helm upgrade --install prometheus prometheus-community/kube-prometheus-stack \
#     --namespace monitoring --create-namespace \
#     --values k8s/monitoring/prometheus-stack-values.yaml \
#     --wait --timeout 10m

nameOverride: prometheus
fullnameOverride: prometheus

# ── Prometheus ────────────────────────────────────────────────────────────────
prometheus:
  prometheusSpec:
    retention: 30d
    retentionSize: "40GB"
    resources:
      requests:
        cpu: 500m
        memory: 2Gi
      limits:
        cpu: 2000m
        memory: 4Gi
    storageSpec:
      volumeClaimTemplate:
        spec:
          accessModes: ["ReadWriteOnce"]
          resources:
            requests:
              storage: 50Gi
    # Scrape all ServiceMonitors across all namespaces
    serviceMonitorSelectorNilUsesHelmValues: false
    serviceMonitorSelector: {}
    serviceMonitorNamespaceSelector: {}
    # Scrape all PrometheusRules across all namespaces
    ruleSelectorNilUsesHelmValues: false
    ruleSelector: {}
    ruleNamespaceSelector: {}
    # Scrape interval
    scrapeInterval: 15s
    evaluationInterval: 15s
    # External labels for multi-cluster setups
    externalLabels:
      cluster: healthlife-production
      environment: production

# ── Alertmanager ─────────────────────────────────────────────────────────────
alertmanager:
  alertmanagerSpec:
    resources:
      requests:
        cpu: 50m
        memory: 64Mi
      limits:
        cpu: 200m
        memory: 256Mi
    storage:
      volumeClaimTemplate:
        spec:
          accessModes: ["ReadWriteOnce"]
          resources:
            requests:
              storage: 2Gi
  config:
    global:
      resolve_timeout: 5m
      # SMTP settings — override via ALERTMANAGER_SMTP_* env vars or Helm --set
      smtp_smarthost: "${ALERTMANAGER_SMTP_HOST:smtp.example.com:587}"
      smtp_from: "alerts@healthlife.com"
      smtp_auth_username: "${ALERTMANAGER_SMTP_USER:}"
      smtp_auth_password: "${ALERTMANAGER_SMTP_PASSWORD:}"
      smtp_require_tls: true

    # Inhibition rules — suppress warning if critical already firing
    inhibit_rules:
      - source_matchers:
          - severity="critical"
        target_matchers:
          - severity="warning"
        equal: ["alertname", "namespace"]

    route:
      group_by: ["alertname", "namespace", "service"]
      group_wait: 30s
      group_interval: 5m
      repeat_interval: 4h
      receiver: "default"
      routes:
        # Critical alerts — immediate Slack + PagerDuty
        - matchers:
            - severity="critical"
          receiver: "critical"
          repeat_interval: 1h
        # Warning alerts — Slack only
        - matchers:
            - severity="warning"
          receiver: "warning"
          repeat_interval: 6h
        # Watchdog (always-firing heartbeat)
        - matchers:
            - alertname="Watchdog"
          receiver: "null"

    receivers:
      - name: "null"

      - name: "default"
        slack_configs:
          - api_url: "${SLACK_WEBHOOK_URL:}"
            channel: "#healthlife-alerts"
            title: '{{ template "slack.default.title" . }}'
            text: '{{ template "slack.default.text" . }}'
            send_resolved: true

      - name: "critical"
        slack_configs:
          - api_url: "${SLACK_WEBHOOK_URL:}"
            channel: "#healthlife-oncall"
            title: "🚨 CRITICAL: {{ .GroupLabels.alertname }}"
            text: |
              *Namespace:* {{ .GroupLabels.namespace }}
              {{ range .Alerts }}
              *Alert:* {{ .Annotations.summary }}
              *Description:* {{ .Annotations.description }}
              *Runbook:* {{ .Annotations.runbook_url }}
              {{ end }}
            send_resolved: true
        pagerduty_configs:
          - routing_key: "${PAGERDUTY_ROUTING_KEY:}"
            description: "{{ .GroupLabels.alertname }}: {{ .CommonAnnotations.summary }}"
            send_resolved: true

      - name: "warning"
        slack_configs:
          - api_url: "${SLACK_WEBHOOK_URL:}"
            channel: "#healthlife-alerts"
            title: "⚠️ WARNING: {{ .GroupLabels.alertname }}"
            text: |
              {{ range .Alerts }}
              *Alert:* {{ .Annotations.summary }}
              *Description:* {{ .Annotations.description }}
              {{ end }}
            send_resolved: true

# ── Grafana ───────────────────────────────────────────────────────────────────
grafana:
  enabled: true
  adminPassword: "${GRAFANA_ADMIN_PASSWORD:ChangeMe2025!}"
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi
  persistence:
    enabled: true
    size: 5Gi
  ingress:
    enabled: true
    ingressClassName: nginx
    annotations:
      cert-manager.io/cluster-issuer: letsencrypt-prod
      nginx.ingress.kubernetes.io/ssl-redirect: "true"
    hosts:
      - grafana.healthlife.com
    tls:
      - secretName: grafana-tls
        hosts:
          - grafana.healthlife.com
  # Auto-provision dashboards from ConfigMaps
  sidecar:
    dashboards:
      enabled: true
      label: grafana_dashboard
      labelValue: "1"
      searchNamespace: ALL
    datasources:
      enabled: true
  # Default datasource
  datasources:
    datasources.yaml:
      apiVersion: 1
      datasources:
        - name: Prometheus
          type: prometheus
          url: http://prometheus-kube-prometheus-prometheus:9090
          isDefault: true
          jsonData:
            timeInterval: 15s

# ── Node Exporter ─────────────────────────────────────────────────────────────
nodeExporter:
  enabled: true

# ── kube-state-metrics ────────────────────────────────────────────────────────
kubeStateMetrics:
  enabled: true

# ── Default rules ─────────────────────────────────────────────────────────────
defaultRules:
  create: true
  rules:
    alertmanager: true
    etcd: false        # not applicable for managed K8s
    configReloaders: true
    general: true
    k8sContainerCpuUsageSecondsTotal: true
    k8sContainerMemoryCache: true
    k8sContainerMemoryRss: true
    k8sContainerMemorySwap: true
    k8sContainerResource: true
    k8sPodOwner: true
    kubeApiserverAvailability: true
    kubeApiserverBurnrate: true
    kubeApiserverHistogram: true
    kubeApiserverSlos: true
    kubeControllerManager: false  # not accessible on managed K8s
    kubelet: true
    kubeProxy: false              # not accessible on managed K8s
    kubePrometheusGeneral: true
    kubePrometheusNodeRecording: true
    kubernetesApps: true
    kubernetesResources: true
    kubernetesStorage: true
    kubernetesSystem: true
    kubeSchedulerAlerting: false  # not accessible on managed K8s
    kubeSchedulerRecording: false
    kubeStateMetrics: true
    network: true
    node: true
    nodeExporterAlerting: true
    nodeExporterRecording: true
    prometheus: true
    prometheusOperator: true
