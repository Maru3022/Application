apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: healthlife-services
  namespace: healthlife
  labels:
    app: healthlife
    release: prometheus
spec:
  namespaceSelector:
    matchNames:
      - healthlife
  # FIX: Services in k8s/base/*.yaml use label "app: <service-name>", not
  # "app.kubernetes.io/part-of: healthlife". Use a label that all services share.
  # We add "monitoring: enabled" to every Service so the selector is explicit and
  # does not accidentally match unrelated services.
  selector:
    matchLabels:
      monitoring: enabled
  endpoints:
    - port: http
      path: /actuator/prometheus
      interval: 15s
      scrapeTimeout: 10s
      honorLabels: true
