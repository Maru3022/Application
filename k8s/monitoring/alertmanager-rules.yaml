apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: healthlife-alerts
  namespace: healthlife
  labels:
    app: healthlife
    release: prometheus
spec:
  groups:
    # ── Availability ──────────────────────────────────────────────────────────
    - name: healthlife.availability
      rules:
        - alert: ServiceDown
          expr: up{job=~"healthlife-.*"} == 0
          for: 2m
          labels:
            severity: critical
          annotations:
            summary: "Service {{ $labels.job }} is down"
            description: "{{ $labels.instance }} has been unreachable for > 2 minutes."
            runbook_url: "https://github.com/maru3022/application/blob/main/docs/OPERATIONS.md#service-down"

        - alert: PodCrashLooping
          expr: rate(kube_pod_container_status_restarts_total{namespace="healthlife"}[15m]) * 60 > 0.5
          for: 5m
          labels:
            severity: critical
          annotations:
            summary: "Pod {{ $labels.pod }} is crash-looping"
            description: "Pod {{ $labels.pod }} in namespace {{ $labels.namespace }} restarts > 0.5/min."
            runbook_url: "https://github.com/maru3022/application/blob/main/docs/OPERATIONS.md#pod-crash-looping"

        - alert: DeploymentReplicasMismatch
          expr: |
            kube_deployment_spec_replicas{namespace="healthlife"}
            != kube_deployment_status_ready_replicas{namespace="healthlife"}
          for: 10m
          labels:
            severity: warning
          annotations:
            summary: "Deployment {{ $labels.deployment }} has unavailable replicas"
            description: "{{ $labels.deployment }} has {{ $value }} ready replicas, expected {{ $labels.spec_replicas }}."
            runbook_url: "https://github.com/maru3022/application/blob/main/docs/OPERATIONS.md#deployment-replicas-mismatch"

        - alert: HpaMaxReplicasReached
          expr: |
            kube_horizontalpodautoscaler_status_current_replicas{namespace="healthlife"}
            >= kube_horizontalpodautoscaler_spec_max_replicas{namespace="healthlife"}
          for: 5m
          labels:
            severity: warning
          annotations:
            summary: "HPA {{ $labels.horizontalpodautoscaler }} at max replicas"
            description: "HPA has reached its maximum replica count. Consider increasing maxReplicas."
            runbook_url: "https://github.com/maru3022/application/blob/main/docs/OPERATIONS.md#hpa-max-replicas"

    # ── Latency ───────────────────────────────────────────────────────────────
    - name: healthlife.latency
      rules:
        - alert: HighLatencyP95
          expr: |
            histogram_quantile(0.95,
              sum(rate(http_server_requests_seconds_bucket{namespace="healthlife"}[5m]))
              by (le, application)
            ) > 2
          for: 5m
          labels:
            severity: warning
          annotations:
            summary: "High P95 latency on {{ $labels.application }}"
            description: "P95 latency is {{ $value | humanizeDuration }} (threshold: 2s)."
            runbook_url: "https://github.com/maru3022/application/blob/main/docs/OPERATIONS.md#high-latency"

        - alert: HighLatencyP99Critical
          expr: |
            histogram_quantile(0.99,
              sum(rate(http_server_requests_seconds_bucket{namespace="healthlife"}[5m]))
              by (le, application)
            ) > 5
          for: 5m
          labels:
            severity: critical
          annotations:
            summary: "Critical P99 latency on {{ $labels.application }}"
            description: "P99 latency is {{ $value | humanizeDuration }} (threshold: 5s)."
            runbook_url: "https://github.com/maru3022/application/blob/main/docs/OPERATIONS.md#high-latency"

    # ── Error Rate ────────────────────────────────────────────────────────────
    - name: healthlife.errors
      rules:
        - alert: HighErrorRate
          expr: |
            sum(rate(http_server_requests_seconds_count{status=~"5..",namespace="healthlife"}[5m]))
            by (application)
            /
            sum(rate(http_server_requests_seconds_count{namespace="healthlife"}[5m]))
            by (application)
            > 0.05
          for: 5m
          labels:
            severity: critical
          annotations:
            summary: "High 5xx error rate on {{ $labels.application }}"
            description: "Error rate is {{ $value | humanizePercentage }} (threshold: 5%)."
            runbook_url: "https://github.com/maru3022/application/blob/main/docs/OPERATIONS.md#high-error-rate"

        - alert: ElevatedErrorRate
          expr: |
            sum(rate(http_server_requests_seconds_count{status=~"5..",namespace="healthlife"}[5m]))
            by (application)
            /
            sum(rate(http_server_requests_seconds_count{namespace="healthlife"}[5m]))
            by (application)
            > 0.01
          for: 10m
          labels:
            severity: warning
          annotations:
            summary: "Elevated error rate on {{ $labels.application }}"
            description: "Error rate is {{ $value | humanizePercentage }} (threshold: 1%)."
            runbook_url: "https://github.com/maru3022/application/blob/main/docs/OPERATIONS.md#high-error-rate"

    # ── Resources ─────────────────────────────────────────────────────────────
    - name: healthlife.resources
      rules:
        - alert: HighMemoryUsage
          expr: |
            container_memory_working_set_bytes{namespace="healthlife", container!=""}
            / container_spec_memory_limit_bytes{namespace="healthlife", container!=""}
            > 0.85
          for: 10m
          labels:
            severity: warning
          annotations:
            summary: "High memory usage in {{ $labels.pod }}"
            description: "Container {{ $labels.container }} in pod {{ $labels.pod }} is using {{ $value | humanizePercentage }} of its memory limit."
            runbook_url: "https://github.com/maru3022/application/blob/main/docs/OPERATIONS.md#high-memory-usage"

        - alert: MemoryNearLimit
          expr: |
            container_memory_working_set_bytes{namespace="healthlife", container!=""}
            / container_spec_memory_limit_bytes{namespace="healthlife", container!=""}
            > 0.95
          for: 5m
          labels:
            severity: critical
          annotations:
            summary: "Memory near OOM limit in {{ $labels.pod }}"
            description: "Container {{ $labels.container }} is at {{ $value | humanizePercentage }} memory — OOMKill imminent."
            runbook_url: "https://github.com/maru3022/application/blob/main/docs/OPERATIONS.md#high-memory-usage"

        - alert: HighCpuThrottling
          expr: |
            rate(container_cpu_cfs_throttled_seconds_total{namespace="healthlife", container!=""}[5m])
            / rate(container_cpu_cfs_periods_total{namespace="healthlife", container!=""}[5m])
            > 0.50
          for: 10m
          labels:
            severity: warning
          annotations:
            summary: "CPU throttling > 50% on {{ $labels.pod }}"
            description: "Container {{ $labels.container }} is being CPU-throttled {{ $value | humanizePercentage }} of the time. Consider increasing CPU limits."
            runbook_url: "https://github.com/maru3022/application/blob/main/docs/OPERATIONS.md#cpu-throttling"

    # ── Database ──────────────────────────────────────────────────────────────
    - name: healthlife.database
      rules:
        - alert: HikariConnectionPoolExhausted
          expr: |
            hikaricp_connections_pending{namespace="healthlife"} > 0
          for: 5m
          labels:
            severity: warning
          annotations:
            summary: "HikariCP connection pool pending on {{ $labels.application }}"
            description: "{{ $labels.application }} has {{ $value }} pending connection requests. Pool may be exhausted."
            runbook_url: "https://github.com/maru3022/application/blob/main/docs/OPERATIONS.md#connection-pool-exhaustion"

        - alert: HikariConnectionPoolCritical
          expr: |
            hikaricp_connections_pending{namespace="healthlife"} > 5
          for: 2m
          labels:
            severity: critical
          annotations:
            summary: "HikariCP pool critically exhausted on {{ $labels.application }}"
            description: "{{ $labels.application }} has {{ $value }} pending DB connections — requests are queuing."
            runbook_url: "https://github.com/maru3022/application/blob/main/docs/OPERATIONS.md#connection-pool-exhaustion"

        - alert: SlowDatabaseQueries
          expr: |
            histogram_quantile(0.95,
              sum(rate(spring_data_repository_invocations_seconds_bucket{namespace="healthlife"}[5m]))
              by (le, application, repository)
            ) > 1
          for: 5m
          labels:
            severity: warning
          annotations:
            summary: "Slow DB queries in {{ $labels.application }}.{{ $labels.repository }}"
            description: "P95 query time is {{ $value | humanizeDuration }} (threshold: 1s)."
            runbook_url: "https://github.com/maru3022/application/blob/main/docs/OPERATIONS.md#slow-database-queries"

    # ── Redis ─────────────────────────────────────────────────────────────────
    - name: healthlife.redis
      rules:
        - alert: RedisDown
          expr: redis_up == 0
          for: 1m
          labels:
            severity: critical
          annotations:
            summary: "Redis is down"
            description: "Redis instance is unreachable. Rate limiting, caching, and session management will fail."
            runbook_url: "https://github.com/maru3022/application/blob/main/docs/OPERATIONS.md#redis-down"

        - alert: RedisHighMemoryUsage
          expr: redis_memory_used_bytes / redis_memory_max_bytes > 0.85
          for: 5m
          labels:
            severity: warning
          annotations:
            summary: "Redis memory usage > 85%"
            description: "Redis is using {{ $value | humanizePercentage }} of maxmemory. Keys may be evicted."
            runbook_url: "https://github.com/maru3022/application/blob/main/docs/OPERATIONS.md#redis-high-memory"

    # ── JVM ───────────────────────────────────────────────────────────────────
    - name: healthlife.jvm
      rules:
        - alert: JvmHeapNearLimit
          expr: |
            jvm_memory_used_bytes{area="heap", namespace="healthlife"}
            / jvm_memory_max_bytes{area="heap", namespace="healthlife"}
            > 0.90
          for: 5m
          labels:
            severity: critical
          annotations:
            summary: "JVM heap > 90% in {{ $labels.application }}"
            description: "JVM heap is at {{ $value | humanizePercentage }}. OutOfMemoryError likely."
            runbook_url: "https://github.com/maru3022/application/blob/main/docs/OPERATIONS.md#jvm-heap-near-limit"

        - alert: JvmGcPressure
          expr: |
            rate(jvm_gc_pause_seconds_sum{namespace="healthlife"}[5m])
            / rate(jvm_gc_pause_seconds_count{namespace="healthlife"}[5m])
            > 0.5
          for: 10m
          labels:
            severity: warning
          annotations:
            summary: "High GC pause time in {{ $labels.application }}"
            description: "Average GC pause is {{ $value | humanizeDuration }} (threshold: 500ms)."
            runbook_url: "https://github.com/maru3022/application/blob/main/docs/OPERATIONS.md#jvm-gc-pressure"

    # ── Security ──────────────────────────────────────────────────────────────
    - name: healthlife.security
      rules:
        - alert: HighAuthFailureRate
          expr: |
            rate(auth_login_failures_total{namespace="healthlife"}[5m]) > 10
          for: 5m
          labels:
            severity: warning
          annotations:
            summary: "High auth failure rate — possible brute force"
            description: "{{ $value }} login failures/sec in the last 5 minutes."
            runbook_url: "https://github.com/maru3022/application/blob/main/docs/OPERATIONS.md#security-incident"

        - alert: RateLimitTriggeredFrequently
          expr: |
            rate(http_server_requests_seconds_count{status="429", namespace="healthlife"}[5m]) > 5
          for: 5m
          labels:
            severity: warning
          annotations:
            summary: "Rate limiting triggered frequently"
            description: "{{ $value }} 429 responses/sec — possible abuse or misconfigured client."
            runbook_url: "https://github.com/maru3022/application/blob/main/docs/OPERATIONS.md#rate-limit-abuse"

    # ── SLO ───────────────────────────────────────────────────────────────────
    - name: healthlife.slo
      rules:
        # 99.9% availability SLO — 8.7h downtime/year budget
        - alert: SloAvailabilityBudgetBurning
          expr: |
            (
              1 - (
                sum(rate(http_server_requests_seconds_count{status!~"5..",namespace="healthlife"}[1h]))
                / sum(rate(http_server_requests_seconds_count{namespace="healthlife"}[1h]))
              )
            ) > (1 - 0.999) * 14.4
          for: 5m
          labels:
            severity: critical
          annotations:
            summary: "SLO error budget burning too fast"
            description: "Current error rate is consuming the 99.9% availability budget 14.4× faster than sustainable."
            runbook_url: "https://github.com/maru3022/application/blob/main/docs/OPERATIONS.md#slo-budget-burn"
