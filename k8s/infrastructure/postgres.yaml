apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: postgres
  namespace: healthlife
spec:
  serviceName: postgres
  replicas: 1
  selector:
    matchLabels:
      app: postgres
  template:
    metadata:
      labels:
        app: postgres
    spec:
      volumes:
        - name: init-scripts
          configMap:
            name: postgres-init
            defaultMode: 0755
      containers:
        - name: postgres
          image: postgres:16-alpine
          ports:
            - containerPort: 5432
          env:
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: healthlife-db-credentials
                  key: username
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: healthlife-db-credentials
                  key: password
            # FIX: POSTGRES_DB must be set (postgres image requires it, even when using init scripts)
            - name: POSTGRES_DB
              value: "healthlife"
            - name: POSTGRES_MULTIPLE_DATABASES
              value: "healthlife_auth,healthlife_user,healthlife_healthdata,healthlife_mental,healthlife_nutrition,healthlife_aicoach,healthlife_social,healthlife_payment"
            # FIX: prevent data directory permission issues
            - name: PGDATA
              value: /var/lib/postgresql/data/pgdata
          volumeMounts:
            - name: postgres-data
              mountPath: /var/lib/postgresql/data
            - name: init-scripts
              mountPath: /docker-entrypoint-initdb.d
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: 1000m
              memory: 1Gi
          readinessProbe:
            exec:
              # FIX: added -d flag to check against the base DB
              command: ["pg_isready", "-U", "$(POSTGRES_USER)", "-d", "healthlife"]
            initialDelaySeconds: 10
            periodSeconds: 5
            failureThreshold: 6
          livenessProbe:
            exec:
              command: ["pg_isready", "-U", "$(POSTGRES_USER)", "-d", "healthlife"]
            initialDelaySeconds: 30
            periodSeconds: 10
            failureThreshold: 3
  volumeClaimTemplates:
    - metadata:
        name: postgres-data
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 5Gi
---
apiVersion: v1
kind: Service
metadata:
  name: postgres
  namespace: healthlife
spec:
  selector:
    app: postgres
  ports:
    - port: 5432
      targetPort: 5432
  type: ClusterIP
