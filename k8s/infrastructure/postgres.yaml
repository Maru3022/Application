apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: postgres
  namespace: healthlife
spec:
  serviceName: postgres
  replicas: 1
  selector:
    matchLabels:
      app: postgres
  template:
    metadata:
      labels:
        app: postgres
    spec:
      volumes:
        - name: init-scripts
          configMap:
            name: postgres-init
            defaultMode: 0755
      containers:
        - name: postgres
          image: postgres:16-alpine
          ports:
            - containerPort: 5432
          env:
            - name: POSTGRES_USER
              value: healthlife
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: healthlife-db-credentials
                  key: password
            - name: POSTGRES_MULTIPLE_DATABASES
              value: "healthlife_auth,healthlife_user,healthlife_healthdata,healthlife_mental,healthlife_nutrition,healthlife_aicoach,healthlife_social"
          volumeMounts:
            - name: postgres-data
              mountPath: /var/lib/postgresql/data
            - name: init-scripts
              mountPath: /docker-entrypoint-initdb.d
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
          readinessProbe:
            exec:
              command: ["pg_isready", "-U", "healthlife"]
            initialDelaySeconds: 10
            periodSeconds: 5
          livenessProbe:
            exec:
              command: ["pg_isready", "-U", "healthlife"]
            initialDelaySeconds: 30
            periodSeconds: 10
  volumeClaimTemplates:
    - metadata:
        name: postgres-data
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 1Gi
---
apiVersion: v1
kind: Service
metadata:
  name: postgres
  namespace: healthlife
spec:
  selector:
    app: postgres
  ports:
    - port: 5432
      targetPort: 5432
  type: ClusterIP
