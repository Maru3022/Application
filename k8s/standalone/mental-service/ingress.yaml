# Ingress — замените host и tls на свои домены
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: mental-service-ingress
  namespace: healthlife
  annotations:
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - api.example.com
      secretName: api-tls
  rules:
    - host: api.example.com
      http:
        paths:
          - path: /api/v1/mental
            pathType: Prefix
            backend:
              service:
                name: mental-service
                port:
                  number: 80
          - path: /api/v1/support
            pathType: Prefix
            backend:
              service:
                name: mental-service
                port:
                  number: 80
