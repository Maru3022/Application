# Deployment mental-service (минимум 2 реплики)
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mental-service
  namespace: healthlife
  labels:
    app: mental-service
spec:
  replicas: 2
  selector:
    matchLabels:
      app: mental-service
  template:
    metadata:
      labels:
        app: mental-service
    spec:
      containers:
        - name: mental-service
          image: your-registry/healthlife-mental-service:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8084
          envFrom:
            - configMapRef:
                name: mental-service-config
            - secretRef:
                name: mental-service-secrets
          resources:
            requests:
              cpu: 250m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
          livenessProbe:
            httpGet:
              path: /internal/actuator/health/liveness
              port: 8084
            initialDelaySeconds: 60
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /internal/actuator/health/readiness
              port: 8084
            initialDelaySeconds: 10
            periodSeconds: 10
