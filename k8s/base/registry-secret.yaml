# GHCR Image Pull Secret
#
# This file is a TEMPLATE — the actual secret must be created manually
# with real credentials. It is excluded from git via .gitignore.
#
# Create the secret with:
#   kubectl create secret docker-registry ghcr-secret \
#     --namespace=healthlife \
#     --docker-server=ghcr.io \
#     --docker-username=Maru3022 \
#     --docker-password=<GITHUB_TOKEN>
#
# Where <GITHUB_TOKEN> is a GitHub Personal Access Token with read:packages scope.
# After creating, verify with:
#   kubectl get secret ghcr-secret -n healthlife -o jsonpath='{.type}'
