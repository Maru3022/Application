apiVersion: apps/v1
kind: Deployment
metadata:
  name: ai-coach-service
  namespace: healthlife
  labels:
    app: ai-coach-service
spec:
  replicas: 2
  selector:
    matchLabels:
      app: ai-coach-service
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: ai-coach-service
    spec:
      imagePullSecrets:
        - name: ghcr-secret
      terminationGracePeriodSeconds: 45
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: ai-coach-service
          image: ghcr.io/maru3022/application/ai-coach-service:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8086
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
          resources:
            # AI Coach makes blocking calls to DeepSeek API (external) and performs
            # JSON serialisation of large prompts — needs more CPU and memory than
            # the default lightweight services.
            requests:
              cpu: 200m
              memory: 512Mi
            limits:
              cpu: 1000m
              memory: 1Gi
          env:
            - name: SPRING_PROFILES_ACTIVE
              value: "production"
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: healthlife-secrets
                  key: jwt-secret
            - name: SPRING_DATASOURCE_URL
              value: "jdbc:postgresql://postgres:5432/healthlife_aicoach"
            - name: SPRING_DATASOURCE_USERNAME
              valueFrom:
                secretKeyRef:
                  name: healthlife-db-credentials
                  key: username
            - name: SPRING_DATASOURCE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: healthlife-db-credentials
                  key: password
            - name: SPRING_DATA_REDIS_HOST
              value: "redis"
            - name: SPRING_DATA_REDIS_PORT
              value: "6379"
            - name: DEEPSEEK_API_KEY
              valueFrom:
                secretKeyRef:
                  name: healthlife-secrets
                  key: deepseek-api-key
                  optional: true
            - name: DEEPSEEK_MODEL
              value: "deepseek-v4-flash"
          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: 8086
            initialDelaySeconds: 20
            periodSeconds: 10
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /actuator/health/liveness
              port: 8086
            initialDelaySeconds: 40
            periodSeconds: 15
            failureThreshold: 3
          lifecycle:
            preStop:
              exec:
                command: ["sh", "-c", "sleep 10"]
          volumeMounts:
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: tmp
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: ai-coach-service
  namespace: healthlife
  labels:
    app: ai-coach-service
    monitoring: enabled
spec:
  selector:
    app: ai-coach-service
  ports:
    - name: http
      port: 80
      targetPort: 8086
  type: ClusterIP
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: ai-coach-service-hpa
  namespace: healthlife
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: ai-coach-service
  minReplicas: 2
  maxReplicas: 6
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: ai-coach-service-pdb
  namespace: healthlife
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app: ai-coach-service
