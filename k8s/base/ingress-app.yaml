# Frontend App Ingress for HealthLife
# Routes / to frontend service (TODO: replace with actual frontend service)
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: app-ingress
  namespace: healthlife
  annotations:
    # TLS with cert-manager
    cert-manager.io/cluster-issuer: letsencrypt-prod
    # Traefik TLS-only configuration
    traefik.ingress.kubernetes.io/router.entrypoints: websecure
    traefik.ingress.kubernetes.io/router.tls: "true"
    # Middleware for compression and buffering
    traefik.ingress.kubernetes.io/router.middlewares: healthlife-compress@kubernetescrd,healthlife-buffering@kubernetescrd
spec:
  ingressClassName: traefik
  tls:
    - hosts:
        - app.healthlife.app
      secretName: app-tls
  rules:
    - host: app.healthlife.app
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                # TODO: replace with actual frontend service when available
                name: gateway-service
                port:
                  number: 80
