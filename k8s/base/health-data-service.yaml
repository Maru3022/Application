apiVersion: apps/v1
kind: Deployment
metadata:
  name: health-data-service
  namespace: healthlife
  labels:
    app: health-data-service
spec:
  replicas: 2
  selector:
    matchLabels:
      app: health-data-service
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: health-data-service
    spec:
      terminationGracePeriodSeconds: 45
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: health-data-service
          image: ghcr.io/maru3022/application/health-data-service:latest
          ports:
            - containerPort: 8083
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
          env:
            - name: SPRING_PROFILES_ACTIVE
              value: "production"
            - name: CORS_ALLOWED_ORIGINS
              value: "https://healthlife.local,https://app.healthlife.com"
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: healthlife-secrets
                  key: jwt-secret
            - name: DB_HOST
              value: "postgres"
            - name: DB_PORT
              value: "5432"
            - name: DB_USERNAME
              valueFrom:
                secretKeyRef:
                  name: healthlife-db-credentials
                  key: username
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: healthlife-db-credentials
                  key: password
          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: 8083
            initialDelaySeconds: 20
            periodSeconds: 10
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /actuator/health/liveness
              port: 8083
            initialDelaySeconds: 40
            periodSeconds: 15
            failureThreshold: 3
          lifecycle:
            preStop:
              exec:
                command: ["sh", "-c", "sleep 10"]
          volumeMounts:
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: tmp
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: health-data-service
  namespace: healthlife
  labels:
    app: health-data-service
    monitoring: enabled
spec:
  selector:
    app: health-data-service
  ports:
    - name: http
      port: 80
      targetPort: 8083
  type: ClusterIP
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: health-data-service-hpa
  namespace: healthlife
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: health-data-service
  minReplicas: 2
  maxReplicas: 6
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: health-data-service-pdb
  namespace: healthlife
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app: health-data-service
