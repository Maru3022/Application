# External Secrets Operator — production secret management
#
# This file replaces k8s/base/secrets.yaml for production deployments.
# It pulls secrets from AWS Secrets Manager (or Vault / GCP Secret Manager)
# and syncs them into Kubernetes Secrets automatically.
#
# Prerequisites:
#   1. Install ESO: helm install external-secrets external-secrets/external-secrets -n external-secrets --create-namespace
#   2. Create an IAM role / service account with read access to the secret paths below
#   3. Annotate the healthlife service account with the IAM role ARN
#
# For local / staging use k8s/base/secrets.yaml instead.
---
apiVersion: external-secrets.io/v1beta1
kind: SecretStore
metadata:
  name: healthlife-secret-store
  namespace: healthlife
spec:
  provider:
    aws:
      service: SecretsManager
      region: ${AWS_REGION:us-east-1}
      auth:
        jwt:
          serviceAccountRef:
            name: healthlife-sa
---
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: healthlife-secrets
  namespace: healthlife
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: healthlife-secret-store
    kind: SecretStore
  target:
    name: healthlife-secrets
    creationPolicy: Owner
  data:
    - secretKey: jwt-secret
      remoteRef:
        key: healthlife/production/jwt-secret
    - secretKey: deepseek-api-key
      remoteRef:
        key: healthlife/production/deepseek-api-key
    - secretKey: firebase-service-account-json
      remoteRef:
        key: healthlife/production/firebase-service-account-json
    - secretKey: stripe-secret-key
      remoteRef:
        key: healthlife/production/stripe-secret-key
    - secretKey: stripe-webhook-secret
      remoteRef:
        key: healthlife/production/stripe-webhook-secret
    - secretKey: stripe-price-pro
      remoteRef:
        key: healthlife/production/stripe-price-pro
    - secretKey: stripe-price-premium
      remoteRef:
        key: healthlife/production/stripe-price-premium
    - secretKey: stripe-price-family
      remoteRef:
        key: healthlife/production/stripe-price-family
    - secretKey: oauth-google-client-id
      remoteRef:
        key: healthlife/production/oauth-google-client-id
    - secretKey: oauth-apple-audience
      remoteRef:
        key: healthlife/production/oauth-apple-audience
---
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: healthlife-db-credentials
  namespace: healthlife
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: healthlife-secret-store
    kind: SecretStore
  target:
    name: healthlife-db-credentials
    creationPolicy: Owner
  data:
    - secretKey: username
      remoteRef:
        key: healthlife/production/db-username
    - secretKey: password
      remoteRef:
        key: healthlife/production/db-password
---
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: healthlife-mail-credentials
  namespace: healthlife
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: healthlife-secret-store
    kind: SecretStore
  target:
    name: healthlife-mail-credentials
    creationPolicy: Owner
  data:
    - secretKey: username
      remoteRef:
        key: healthlife/production/mail-username
    - secretKey: password
      remoteRef:
        key: healthlife/production/mail-password
---
# Service account used by all HealthLife pods to authenticate with AWS
apiVersion: v1
kind: ServiceAccount
metadata:
  name: healthlife-sa
  namespace: healthlife
  annotations:
    # Replace with your actual IAM role ARN
    eks.amazonaws.com/role-arn: "arn:aws:iam::ACCOUNT_ID:role/healthlife-secrets-reader"
