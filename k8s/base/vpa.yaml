# Vertical Pod Autoscaler recommendations for all HealthLife services.
# updateMode: "Off" means VPA only provides recommendations — it does NOT restart pods.
# Review recommendations via: kubectl describe vpa -n healthlife
# Switch to "Auto" only after validating recommended ranges in staging.
---
apiVersion: autoscaling.k8s.io/v1
kind: VerticalPodAutoscaler
metadata:
  name: gateway-service-vpa
  namespace: healthlife
spec:
  targetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: gateway-service
  updatePolicy:
    updateMode: "Off"
  resourcePolicy:
    containerPolicies:
      - containerName: '*'
        minAllowed:
          cpu: 50m
          memory: 128Mi
        maxAllowed:
          cpu: 2000m
          memory: 1Gi
        controlledResources: ["cpu", "memory"]
---
