# FIX: Secrets were referenced in all deployments but never defined in the repo.
# This file contains placeholder secrets — REPLACE VALUES BEFORE DEPLOYING.
# For production use: External Secrets Operator, Vault, or Sealed Secrets.
apiVersion: v1
kind: Secret
metadata:
  name: healthlife-secrets
  namespace: healthlife
type: Opaque
stringData:
  # REQUIRED: Generate with: openssl rand -base64 64
  jwt-secret: "REPLACE_ME_WITH_A_SECURE_256BIT_OR_LONGER_SECRET_KEY_AT_LEAST_32_CHARS"
  # OPTIONAL: DeepSeek API key — https://platform.deepseek.com/api_keys
  deepseek-api-key: ""
  # OPTIONAL: Full JSON content of Firebase service account key (for push notifications)
  # Download from Firebase Console → Project Settings → Service Accounts → Generate new private key
  firebase-service-account-json: ""
  # OPTIONAL: Stripe secret key (sk_test_... or sk_live_...)
  stripe-secret-key: ""
  # OPTIONAL: Stripe webhook signing secret (whsec_...)
  stripe-webhook-secret: ""
---
apiVersion: v1
kind: Secret
metadata:
  name: healthlife-db-credentials
  namespace: healthlife
type: Opaque
stringData:
  username: healthlife
  # REQUIRED: Set a strong password
  password: "REPLACE_ME_WITH_STRONG_DB_PASSWORD"
---
apiVersion: v1
kind: Secret
metadata:
  name: healthlife-mail-credentials
  namespace: healthlife
type: Opaque
stringData:
  username: ""
  password: ""
