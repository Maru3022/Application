# ============================================================
# HealthLife – Kubernetes Secrets
# ============================================================
# DO NOT commit real production credentials to source control.
# These values are intentionally short-lived DEV/CI defaults.
#
# For production, use one of:
#   • External Secrets Operator + AWS Secrets Manager / GCP Secret Manager
#   • Sealed Secrets (kubeseal)
#   • HashiCorp Vault with the Vault Agent Injector
#
# Generate a new JWT secret:
#   openssl rand -base64 64
# ============================================================
apiVersion: v1
kind: Secret
metadata:
  name: healthlife-secrets
  namespace: healthlife
type: Opaque
stringData:
  # 64-char base64 JWT signing secret (HS256/HS512).
  # Rotate this before going to production.
  jwt-secret: "ZMNhIXLA8BJucBOIjSr4MyK6PQ4rRTkjhiOGf7FXgsSCgHasqO7tg6Qsj25iBJDR"

  # DeepSeek API key — https://platform.deepseek.com/api_keys
  # Leave empty to disable AI coach features in dev.
  deepseek-api-key: ""

  # Full JSON content of a Firebase service account key.
  # Download from: Firebase Console → Project Settings → Service Accounts
  #   → Generate new private key → paste the file content here as one line.
  firebase-service-account-json: ""

  # Stripe secret key (sk_test_... for test mode, sk_live_... for production).
  stripe-secret-key: ""

  # Stripe webhook signing secret (whsec_...).
  # Retrieve from: Stripe Dashboard → Developers → Webhooks → your endpoint → Signing secret.
  stripe-webhook-secret: ""
---
apiVersion: v1
kind: Secret
metadata:
  name: healthlife-db-credentials
  namespace: healthlife
type: Opaque
stringData:
  username: healthlife
  # Strong random password — change before deploying to production:
  #   openssl rand -base64 32 | tr -d '/+='
  password: "qW5rn7iQ8woBAXfDR0TkCfdCGpHqbL5J"
---
apiVersion: v1
kind: Secret
metadata:
  name: healthlife-mail-credentials
  namespace: healthlife
type: Opaque
stringData:
  # SMTP username (e.g. noreply@yourdomain.com or SendGrid API key username)
  username: ""
  # SMTP password or SendGrid API key
  password: ""
