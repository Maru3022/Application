server:
  port: 8086

spring:
  datasource:
    url: jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;MODE=PostgreSQL
    username: sa
    password:
    driver-class-name: org.h2.Driver
  jpa:
    hibernate:
      ddl-auto: create-drop
  flyway:
    enabled: false
  data:
    redis:
      host: localhost
      port: 6379

jwt:
  secret: TestSecretKeyThatIsAtLeast256BitsLongForHS256Algorithm2025TestTest
  access-token:
    expiration: 900000
  refresh-token:
    expiration: 604800000

ai:
  claude:
    api-key: test-key
    model: claude-3-haiku
    base-url: https://api.anthropic.com
