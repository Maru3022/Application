server:
  port: 8086

spring:
  application:
    name: ai-coach-service
  datasource:
    url: jdbc:postgresql://localhost:5432/healthlife_aicoach
    username: healthlife
    password: healthlife_pass
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
  flyway:
    enabled: true
    locations: classpath:db/migration
  data:
    redis:
      host: localhost
      port: 6379

jwt:
  secret: ${JWT_SECRET:HealthLifeSuperSecretKeyThatIsAtLeast256BitsLongForHS256Algorithm2025}
  access-token:
    expiration: 900000
  refresh-token:
    expiration: 604800000

ai:
  claude:
    api-key: ${CLAUDE_API_KEY:}
    base-url: https://api.anthropic.com
