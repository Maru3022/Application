server:
  port: 8084

spring:
  application:
    name: mental-service
  datasource:
    url: jdbc:postgresql://localhost:5432/healthlife_mental
    username: healthlife
    password: healthlife_pass
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
  flyway:
    enabled: true
    locations: classpath:db/migration

jwt:
  secret: ${JWT_SECRET:HealthLifeSuperSecretKeyThatIsAtLeast256BitsLongForHS256Algorithm2025}
  access-token:
    expiration: 900000
  refresh-token:
    expiration: 604800000
