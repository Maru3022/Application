version: '3.8'

# HealthLife — полный локальный стек для просмотра работы приложения
# Запуск: docker compose -f docker-compose.local.yml up --build
# Остановка: docker compose -f docker-compose.local.yml down -v

networks:
  healthlife:
    driver: bridge

volumes:
  pg_auth_data:
  pg_user_data:
  pg_health_data:
  pg_mental_data:
  pg_nutrition_data:
  pg_aicoach_data:
  pg_social_data:
  pg_payment_data:
  redis_data:

# ── Общие переменные ──────────────────────────────────────────────────────
x-common-env: &common-env
  JWT_SECRET: "LocalDevSecretKeyThatIsAtLeast256BitsLongForHS256Algorithm2025"
  SPRING_PROFILES_ACTIVE: "local"
  CORS_ALLOWED_ORIGINS: "http://localhost:3000,http://localhost:8080"

x-db-env: &db-env
  SPRING_DATASOURCE_USERNAME: healthlife
  SPRING_DATASOURCE_PASSWORD: healthlife_pass

x-healthcheck: &spring-healthcheck
  interval: 15s
  timeout: 5s
  retries: 10
  start_period: 60s

services:

  # ── Инфраструктура ────────────────────────────────────────────────────────

  postgres-auth:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: healthlife_auth
      POSTGRES_USER: healthlife
      POSTGRES_PASSWORD: healthlife_pass
    ports: ["5432:5432"]
    volumes: [pg_auth_data:/var/lib/postgresql/data]
    networks: [healthlife]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U healthlife -d healthlife_auth"]
      interval: 5s
      timeout: 5s
      retries: 10

  postgres-user:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: healthlife_user
      POSTGRES_USER: healthlife
      POSTGRES_PASSWORD: healthlife_pass
    ports: ["5433:5432"]
    volumes: [pg_user_data:/var/lib/postgresql/data]
    networks: [healthlife]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U healthlife -d healthlife_user"]
      interval: 5s
      timeout: 5s
      retries: 10

  postgres-health:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: healthlife_healthdata
      POSTGRES_USER: healthlife
      POSTGRES_PASSWORD: healthlife_pass
    ports: ["5434:5432"]
    volumes: [pg_health_data:/var/lib/postgresql/data]
    networks: [healthlife]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U healthlife -d healthlife_healthdata"]
      interval: 5s
      timeout: 5s
      retries: 10

  postgres-mental:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: healthlife_mental
      POSTGRES_USER: healthlife
      POSTGRES_PASSWORD: healthlife_pass
    ports: ["5435:5432"]
    volumes: [pg_mental_data:/var/lib/postgresql/data]
    networks: [healthlife]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U healthlife -d healthlife_mental"]
      interval: 5s
      timeout: 5s
      retries: 10

  postgres-nutrition:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: healthlife_nutrition
      POSTGRES_USER: healthlife
      POSTGRES_PASSWORD: healthlife_pass
    ports: ["5436:5432"]
    volumes: [pg_nutrition_data:/var/lib/postgresql/data]
    networks: [healthlife]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U healthlife -d healthlife_nutrition"]
      interval: 5s
      timeout: 5s
      retries: 10

  postgres-aicoach:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: healthlife_aicoach
      POSTGRES_USER: healthlife
      POSTGRES_PASSWORD: healthlife_pass
    ports: ["5437:5432"]
    volumes: [pg_aicoach_data:/var/lib/postgresql/data]
    networks: [healthlife]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U healthlife -d healthlife_aicoach"]
      interval: 5s
      timeout: 5s
      retries: 10

  postgres-social:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: healthlife_social
      POSTGRES_USER: healthlife
      POSTGRES_PASSWORD: healthlife_pass
    ports: ["5438:5432"]
    volumes: [pg_social_data:/var/lib/postgresql/data]
    networks: [healthlife]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U healthlife -d healthlife_social"]
      interval: 5s
      timeout: 5s
      retries: 10

  postgres-payment:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: healthlife_payment
      POSTGRES_USER: healthlife
      POSTGRES_PASSWORD: healthlife_pass
    ports: ["5439:5432"]
    volumes: [pg_payment_data:/var/lib/postgresql/data]
    networks: [healthlife]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U healthlife -d healthlife_payment"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    command: redis-server --save 60 1 --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    ports: ["6379:6379"]
    volumes: [redis_data:/data]
    networks: [healthlife]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ── Микросервисы ──────────────────────────────────────────────────────────

  auth-service:
    build:
      context: ./services/auth-service
      dockerfile: Dockerfile
    ports: ["8081:8081"]
    networks: [healthlife]
    depends_on:
      postgres-auth:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      <<: [*common-env, *db-env]
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres-auth:5432/healthlife_auth
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: "6379"
      MAIL_SMTP_HOST: "localhost"
      MAIL_SMTP_PORT: "25"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8081/actuator/health/liveness || exit 1"]
      <<: *spring-healthcheck

  user-service:
    build:
      context: ./services/user-service
      dockerfile: Dockerfile
    ports: ["8082:8082"]
    networks: [healthlife]
    depends_on:
      postgres-user:
        condition: service_healthy
    environment:
      <<: [*common-env, *db-env]
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres-user:5432/healthlife_user
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8082/actuator/health/liveness || exit 1"]
      <<: *spring-healthcheck

  health-data-service:
    build:
      context: ./services/health-data-service
      dockerfile: Dockerfile
    ports: ["8083:8083"]
    networks: [healthlife]
    depends_on:
      postgres-health:
        condition: service_healthy
    environment:
      <<: [*common-env, *db-env]
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres-health:5432/healthlife_healthdata
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8083/actuator/health/liveness || exit 1"]
      <<: *spring-healthcheck

  mental-service:
    build:
      context: ./services/mental-service
      dockerfile: Dockerfile
    ports: ["8084:8084"]
    networks: [healthlife]
    depends_on:
      postgres-mental:
        condition: service_healthy
    environment:
      <<: [*common-env, *db-env]
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres-mental:5432/healthlife_mental
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8084/actuator/health/liveness || exit 1"]
      <<: *spring-healthcheck

  nutrition-service:
    build:
      context: ./services/nutrition-service
      dockerfile: Dockerfile
    ports: ["8085:8085"]
    networks: [healthlife]
    depends_on:
      postgres-nutrition:
        condition: service_healthy
    environment:
      <<: [*common-env, *db-env]
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres-nutrition:5432/healthlife_nutrition
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8085/actuator/health/liveness || exit 1"]
      <<: *spring-healthcheck

  ai-coach-service:
    build:
      context: ./services/ai-coach-service
      dockerfile: Dockerfile
    ports: ["8086:8086"]
    networks: [healthlife]
    depends_on:
      postgres-aicoach:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      <<: [*common-env, *db-env]
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres-aicoach:5432/healthlife_aicoach
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: "6379"
      DEEPSEEK_API_KEY: "${DEEPSEEK_API_KEY:-}"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8086/actuator/health/liveness || exit 1"]
      <<: *spring-healthcheck

  social-service:
    build:
      context: ./services/social-service
      dockerfile: Dockerfile
    ports: ["8087:8087"]
    networks: [healthlife]
    depends_on:
      postgres-social:
        condition: service_healthy
    environment:
      <<: [*common-env, *db-env]
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres-social:5432/healthlife_social
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8087/actuator/health/liveness || exit 1"]
      <<: *spring-healthcheck

  notification-service:
    build:
      context: ./services/notification-service
      dockerfile: Dockerfile
    ports: ["8088:8088"]
    networks: [healthlife]
    depends_on:
      redis:
        condition: service_healthy
    environment:
      <<: *common-env
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: "6379"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8088/actuator/health/liveness || exit 1"]
      <<: *spring-healthcheck

  analytics-service:
    build:
      context: ./services/analytics-service
      dockerfile: Dockerfile
    ports: ["8089:8089"]
    networks: [healthlife]
    depends_on:
      redis:
        condition: service_healthy
    environment:
      <<: *common-env
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: "6379"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8089/actuator/health/liveness || exit 1"]
      <<: *spring-healthcheck

  payment-service:
    build:
      context: ./services/payment-service
      dockerfile: Dockerfile
    ports: ["8090:8090"]
    networks: [healthlife]
    depends_on:
      postgres-payment:
        condition: service_healthy
    environment:
      <<: [*common-env, *db-env]
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres-payment:5432/healthlife_payment
      STRIPE_SECRET_KEY: "${STRIPE_SECRET_KEY:-}"
      STRIPE_WEBHOOK_SECRET: "${STRIPE_WEBHOOK_SECRET:-}"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8090/actuator/health/liveness || exit 1"]
      <<: *spring-healthcheck

  gateway-service:
    build:
      context: ./services/gateway-service
      dockerfile: Dockerfile
    ports: ["8080:8080"]
    networks: [healthlife]
    depends_on:
      auth-service:
        condition: service_healthy
      user-service:
        condition: service_healthy
      health-data-service:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      <<: *common-env
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: "6379"
      GATEWAY_ROUTE_AUTH: http://auth-service:8081
      GATEWAY_ROUTE_USERS: http://user-service:8082
      GATEWAY_ROUTE_HEALTH: http://health-data-service:8083
      GATEWAY_ROUTE_MENTAL: http://mental-service:8084
      GATEWAY_ROUTE_NUTRITION: http://nutrition-service:8085
      GATEWAY_ROUTE_AI: http://ai-coach-service:8086
      GATEWAY_ROUTE_SOCIAL: http://social-service:8087
      GATEWAY_ROUTE_NOTIFICATIONS: http://notification-service:8088
      GATEWAY_ROUTE_ANALYTICS: http://analytics-service:8089
      GATEWAY_ROUTE_PAYMENTS: http://payment-service:8090
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/actuator/health/liveness || exit 1"]
      <<: *spring-healthcheck
